<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정유하's 지오메트리 대시</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Arial', sans-serif; overflow: hidden; }

  #menuScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #menuScreen h1 {
    font-size: 48px; color: #fff; text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;
    margin-bottom: 10px; letter-spacing: 3px;
    animation: glow 2s ease-in-out infinite alternate;
  }
  #menuScreen .subtitle {
    font-size: 20px; color: #ffd700; margin-bottom: 15px;
    text-shadow: 0 0 10px #ffd700;
  }
  #menuScreen .student-name {
    font-size: 18px; color: #a0f0ff; margin-bottom: 50px;
    background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px;
    border: 1px solid rgba(160,240,255,0.4);
  }
  @keyframes glow {
    from { text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b; }
    to { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700; }
  }
  .level-cards {
    display: flex; gap: 30px; flex-wrap: wrap; justify-content: center;
  }
  .level-card {
    width: 200px; padding: 30px 20px; border-radius: 20px;
    cursor: pointer; text-align: center; transition: all 0.3s;
    border: 3px solid transparent; position: relative; overflow: hidden;
  }
  .level-card::before {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: rotate(45deg); transition: all 0.5s;
    opacity: 0;
  }
  .level-card:hover::before { opacity: 1; transform: rotate(45deg) translate(50%, 50%); }
  .level-card:hover { transform: scale(1.08) translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
  .level-card.easy { background: linear-gradient(135deg, #11998e, #38ef7d); border-color: #38ef7d; }
  .level-card.hard { background: linear-gradient(135deg, #f7971e, #ffd200); border-color: #ffd200; }
  .level-card.extreme { background: linear-gradient(135deg, #eb3349, #f45c43); border-color: #ff4444; }
  .level-card .level-num {
    font-size: 50px; font-weight: bold; color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px;
  }
  .level-card .level-name {
    font-size: 18px; color: #fff; font-weight: bold; margin-bottom: 8px;
  }
  .level-card .level-desc {
    font-size: 13px; color: rgba(255,255,255,0.85);
  }
  .stars { font-size: 20px; margin-top: 10px; }

  #gameScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 10px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 20px; z-index: 50; pointer-events: none;
  }
  #ui .info-box {
    background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
    border-radius: 12px; font-size: 16px; font-weight: bold;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #progressBar {
    position: fixed; top: 0; left: 0; height: 5px;
    background: linear-gradient(90deg, #00f5ff, #ff00ff);
    transition: width 0.1s; z-index: 51; border-radius: 0 3px 3px 0;
    box-shadow: 0 0 10px #00f5ff;
  }

  #overlayScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 200;
  }
  #overlayScreen h2 {
    font-size: 56px; color: #fff; margin-bottom: 20px;
    text-shadow: 0 0 30px currentColor;
  }
  #overlayScreen p {
    font-size: 20px; color: #ccc; margin-bottom: 10px;
  }
  .ov-btn {
    margin: 10px; padding: 14px 35px; font-size: 18px; font-weight: bold;
    border: none; border-radius: 30px; cursor: pointer;
    transition: all 0.2s; pointer-events: all;
  }
  .ov-btn:hover { transform: scale(1.07); }
  .btn-retry { background: linear-gradient(135deg, #f7971e, #ffd200); color: #333; }
  .btn-menu  { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

  #backBtn {
    position: fixed; top: 12px; right: 15px; z-index: 300;
    background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    padding: 7px 16px; border-radius: 20px; cursor: pointer;
    font-size: 14px; display: none; transition: all 0.2s;
  }
  #backBtn:hover { background: rgba(255,255,255,0.2); }

  #tapHint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: #fff; padding: 8px 20px;
    border-radius: 20px; font-size: 14px; z-index: 50;
    animation: fadeInOut 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes fadeInOut {
    0%,100% { opacity: 0.4; } 50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- 메뉴 화면 -->
<div id="menuScreen">
  <h1>⬡ GEOMETRY DASH ⬡</h1>
  <div class="subtitle">✦ 장애물을 피해라! ✦</div>
  <div class="student-name">🎮 정유하's 게임</div>
  <div class="level-cards">
    <div class="level-card easy" onclick="startGame(1)">
      <div class="level-num">1</div>
      <div class="level-name">EASY</div>
      <div class="level-desc">처음 해보는 사람도<br>OK! 천천히 가자</div>
      <div class="stars">⭐</div>
    </div>
    <div class="level-card hard" onclick="startGame(2)">
      <div class="level-num">2</div>
      <div class="level-name">HARD</div>
      <div class="level-desc">좀 빠르고 장애물도<br>많아졌어요!</div>
      <div class="stars">⭐⭐⭐</div>
    </div>
    <div class="level-card extreme" onclick="startGame(3)">
      <div class="level-num">3</div>
      <div class="level-name">EXTREME</div>
      <div class="level-desc">포탈, 고속! 과연<br>클리어 할 수 있나?</div>
      <div class="stars">⭐⭐⭐⭐⭐</div>
    </div>
  </div>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
  <canvas id="gameCanvas"></canvas>
  <div id="progressBar" style="width:0%"></div>
  <div id="ui">
    <div class="info-box" id="levelLabel">LEVEL 1</div>
    <div class="info-box" id="attemptLabel">시도: 1</div>
    <div class="info-box" id="progressLabel">0%</div>
  </div>
  <div id="tapHint">스페이스바 / 클릭 / 탭 → 점프</div>
</div>

<button id="backBtn" onclick="goMenu()">← 메뉴</button>

<!-- 오버레이 (사망/클리어) -->
<div id="overlayScreen">
  <h2 id="overlayTitle">💀 사망!</h2>
  <p id="overlayMsg">다시 도전해보세요!</p>
  <p id="overlayProgress"></p>
  <div>
    <button class="ov-btn btn-retry" onclick="retryGame()">🔄 다시 시도</button>
    <button class="ov-btn btn-menu"  onclick="goMenu()">🏠 메뉴로</button>
  </div>
</div>

<script>
// ───────────────────────────────────────────────
// 전역 변수
// ───────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

let W, H, GROUND;
let gameState  = 'menu'; // menu | playing | dead | clear
let currentLevel = 1;
let attempts   = 1;
let animId     = null;

// 플레이어
let player;
// 세계 스크롤
let camX;
// 파티클
let particles;
// 레벨 데이터
let levelData;
// 포탈 상태
let inShipMode;
let shipVy;

// ───────────────────────────────────────────────
// 레벨 생성
// ───────────────────────────────────────────────
function buildLevel(lvl) {
  const obstacles = [];
  const portals    = [];
  const coins      = [];

  if (lvl === 1) {
    // 단순한 장애물
    const spikes = [
      400, 600, 900, 1100, 1400, 1700, 1900, 2100,
      2400, 2600, 2900, 3100, 3400, 3600, 3800
    ];
    spikes.forEach(x => obstacles.push({ x, type: 'spike' }));

    // 낮은 블록
    [[500,2],[1200,1],[2200,2],[3200,2]].forEach(([x,h]) =>
      obstacles.push({ x, type: 'block', h })
    );

    // 코인
    [300,800,1600,2800].forEach(x =>
      coins.push({ x, y: GROUND - 80, collected: false })
    );

    return { length: 4200, obstacles, portals, coins, speed: 4 };
  }

  if (lvl === 2) {
    const sx = [
      300,500,700,900,1000,1200,1400,1500,
      1700,1900,2100,2200,2400,2600,2700,
      2900,3100,3300,3500,3700,3900,4100,4300
    ];
    sx.forEach(x => obstacles.push({ x, type: 'spike' }));

    [[600,2],[1100,3],[1800,2],[2500,3],[3200,2],[3800,3]].forEach(([x,h]) =>
      obstacles.push({ x, type: 'block', h })
    );

    // 더블 스파이크
    [1600,2800,3600].forEach(x => {
      obstacles.push({ x, type: 'spike' });
      obstacles.push({ x: x+40, type: 'spike' });
    });

    portals.push({ x: 2000, type: 'ship' });
    portals.push({ x: 2800, type: 'cube' });

    [500,1200,2000,3000,4000].forEach(x =>
      coins.push({ x, y: GROUND - 90, collected: false })
    );

    return { length: 4800, obstacles, portals, coins, speed: 6 };
  }

  // lvl === 3
  const sx3 = [];
  for (let i = 250; i < 5500; i += 180) sx3.push(i);
  // 간격 좁히기 중반부
  for (let i = 2000; i < 3500; i += 80) sx3.push(i);
  sx3.forEach(x => obstacles.push({ x, type: 'spike' }));

  [[400,2],[700,3],[1000,4],[1300,3],[1600,4],
   [2400,2],[2800,3],[3500,4],[4000,3],[4500,4]].forEach(([x,h]) =>
    obstacles.push({ x, type: 'block', h })
  );

  // 천장 스파이크
  [1500,1700,1900,3500,3700,3900].forEach(x =>
    obstacles.push({ x, type: 'ceiling_spike' })
  );

  portals.push({ x: 1500, type: 'ship' });
  portals.push({ x: 3000, type: 'cube' });
  portals.push({ x: 3800, type: 'ship' });
  portals.push({ x: 4800, type: 'cube' });

  [600,1200,2000,2800,3600,4400].forEach(x =>
    coins.push({ x, y: GROUND - 100, collected: false })
  );

  return { length: 5800, obstacles, portals, coins, speed: 9 };
}

// ───────────────────────────────────────────────
// 초기화
// ───────────────────────────────────────────────
function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND = H - 80;
}

function initPlayer() {
  player = {
    x: 120, y: GROUND - 40,
    w: 36, h: 36,
    vy: 0, onGround: false,
    rotation: 0, color: '#00f5ff',
    trail: []
  };
}

function startGame(lvl) {
  currentLevel = lvl;
  attempts     = 1;
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('backBtn').style.display    = 'block';
  resizeCanvas();
  initRound();
}

function initRound() {
  camX       = 0;
  inShipMode = false;
  shipVy     = 0;
  particles  = [];
  levelData  = buildLevel(currentLevel);
  initPlayer();

  document.getElementById('levelLabel').textContent   = `LEVEL ${currentLevel}`;
  document.getElementById('attemptLabel').textContent = `시도: ${attempts}`;
  document.getElementById('progressLabel').textContent= `0%`;
  document.getElementById('progressBar').style.width  = '0%';

  if (animId) cancelAnimationFrame(animId);
  gameState = 'playing';
  gameLoop();
}

// ───────────────────────────────────────────────
// 입력
// ───────────────────────────────────────────────
let jumpPressed = false;

function doJump() {
  if (gameState !== 'playing') return;
  if (inShipMode) {
    shipVy = -6;
  } else {
    if (player.onGround) {
      player.vy = -13;
      player.onGround = false;
      spawnParticles(player.x + player.w/2, player.y + player.h, '#fff', 5);
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); doJump(); });

// ───────────────────────────────────────────────
// 파티클
// ───────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: (Math.random()-1.5)*5,
      life: 30 + Math.random()*20,
      maxLife: 50,
      color,
      size: 3 + Math.random()*4
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camX + player.x - (player.x - camX), p.y, p.size, 0, Math.PI*2);
    // 파티클은 world좌표이므로 camX 변환
    ctx.restore();
  });
}

// ───────────────────────────────────────────────
// 충돌 검사 (AABB)
// ───────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function getSpikeHitbox(ox) {
  // 스파이크는 바닥에서 올라오는 삼각형 → hitbox 조금 여유
  return { x: ox+4, y: GROUND-38, w: 28, h: 38 };
}

function getCeilingSpikeHitbox(ox) {
  return { x: ox+4, y: 0, w: 28, h: 38 };
}

function getBlockHitbox(ox, bh) {
  const blockH = bh * 40;
  return { x: ox, y: GROUND - blockH, w: 40, h: blockH };
}

// ───────────────────────────────────────────────
// 메인 업데이트
// ───────────────────────────────────────────────
const GRAVITY   = 0.7;
const SHIP_GRAV = 0.3;

function update() {
  if (gameState !== 'playing') return;

  const spd = levelData.speed;

  // 카메라 (월드 스크롤)
  camX += spd;

  // 진행률
  const pct = Math.min(100, Math.floor(camX / levelData.length * 100));
  document.getElementById('progressLabel').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width   = pct + '%';

  // 클리어
  if (camX >= levelData.length) {
    triggerClear(); return;
  }

  // ── 플레이어 물리 ──
  if (inShipMode) {
    // SHIP 모드: 항상 비행, 중력 약하게, 클릭시 위로
    shipVy += SHIP_GRAV;
    player.y += shipVy;

    // 천장/바닥
    if (player.y < 0)          { player.y = 0; shipVy = 0; }
    if (player.y > GROUND - player.h) { player.y = GROUND - player.h; shipVy = 0; }

    player.rotation += 3;
  } else {
    // CUBE 모드
    player.vy += GRAVITY;
    player.y  += player.vy;

    if (player.y >= GROUND - player.h) {
      player.y = GROUND - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }

    if (player.onGround) {
      player.rotation = Math.round(player.rotation / 90) * 90;
    } else {
      player.rotation += 6;
    }
  }

  // 트레일
  player.trail.push({ x: player.x + player.w/2, y: player.y + player.h/2 });
  if (player.trail.length > 12) player.trail.shift();

  // ── 장애물 충돌 ──
  const px = player.x, py = player.y, pw = player.w, ph = player.h;

  for (const ob of levelData.obstacles) {
    const ox = ob.x - camX + px; // screen x of obstacle relative to player

    // culling
    if (ox > W + 100 || ox < -100) continue;

    let hb;
    if (ob.type === 'spike') {
      const wx = ob.x; // world x
      hb = { x: wx - camX + px - px + px, y: GROUND-38, w: 28, h: 38 };
      // 실제로: obstacle 월드 x에서 camX를 빼면 screen x
      // player는 항상 screen x = player.x (120)
      const sx = ob.x - camX + 120; // screen x
      hb = { x: sx+4, y: GROUND-38, w: 28, h: 38 };
    } else if (ob.type === 'block') {
      const sx = ob.x - camX + 120;
      const blockH = ob.h * 40;
      hb = { x: sx, y: GROUND - blockH, w: 40, h: blockH };
    } else if (ob.type === 'ceiling_spike') {
      const sx = ob.x - camX + 120;
      hb = { x: sx+4, y: 0, w: 28, h: 38 };
    } else continue;

    if (rectOverlap(px, py, pw, ph, hb.x, hb.y, hb.w, hb.h)) {
      triggerDeath(); return;
    }
  }

  // ── 포탈 충돌 ──
  for (const pt of levelData.portals) {
    const sx = pt.x - camX + 120;
    if (Math.abs(sx - px) < 50 && py < GROUND) {
      if (pt.type === 'ship' && !inShipMode) {
        inShipMode = true; shipVy = 0;
        spawnParticles(px, py, '#ff00ff', 15);
      } else if (pt.type === 'cube' && inShipMode) {
        inShipMode = false;
        spawnParticles(px, py, '#00ffff', 15);
      }
    }
  }

  // ── 코인 수집 ──
  levelData.coins.forEach(c => {
    if (c.collected) return;
    const sx = c.x - camX + 120;
    if (rectOverlap(px, py, pw, ph, sx-12, c.y-12, 24, 24)) {
      c.collected = true;
      spawnParticles(sx, c.y, '#ffd700', 10);
    }
  });

  updateParticles();
}

// ───────────────────────────────────────────────
// 그리기
// ───────────────────────────────────────────────
function drawBackground() {
  // 그라데이션 배경 (레벨별)
  const grad = ctx.createLinearGradient(0,0,0,H);
  if (currentLevel===1) {
    grad.addColorStop(0,'#0f0c29'); grad.addColorStop(1,'#302b63');
  } else if (currentLevel===2) {
    grad.addColorStop(0,'#200122'); grad.addColorStop(1,'#6f0000');
  } else {
    grad.addColorStop(0,'#000000'); grad.addColorStop(1,'#1a0033');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // 별
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i=0; i<60; i++) {
    const bx = ((i*137 + camX*0.05) % W + W) % W;
    const by = (i*97) % (H-100);
    const bs = 1 + (i%3)*0.5;
    ctx.fillRect(bx, by, bs, bs);
  }
}

function drawGround() {
  // 바닥
  ctx.fillStyle = currentLevel===1 ? '#2d5a27' : currentLevel===2 ? '#5a2700' : '#1a0033';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = currentLevel===1 ? '#4caf50' : currentLevel===2 ? '#ff6600' : '#9900ff';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();

  // 바닥 타일 라인
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  const tileW = 40;
  const offset = camX % tileW;
  for (let x = -offset; x < W; x += tileW) {
    ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawObstacles() {
  levelData.obstacles.forEach(ob => {
    const sx = ob.x - camX + 120;
    if (sx > W + 60 || sx < -60) return;

    if (ob.type === 'spike') {
      ctx.save();
      const spkColor = currentLevel===1 ? '#ff4444' : currentLevel===2 ? '#ff8800' : '#ff00ff';
      ctx.fillStyle = spkColor;
      ctx.shadowColor = spkColor; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(sx, GROUND);
      ctx.lineTo(sx+18, GROUND-38);
      ctx.lineTo(sx+36, GROUND);
      ctx.closePath(); ctx.fill();
      ctx.restore();

    } else if (ob.type === 'block') {
      const blockH = ob.h * 40;
      const by = GROUND - blockH;
      const bColor = currentLevel===1 ? '#4a9eff' : currentLevel===2 ? '#ff9500' : '#cc00ff';
      ctx.save();
      ctx.fillStyle = bColor;
      ctx.shadowColor = bColor; ctx.shadowBlur = 6;
      ctx.fillRect(sx, by, 40, blockH);
