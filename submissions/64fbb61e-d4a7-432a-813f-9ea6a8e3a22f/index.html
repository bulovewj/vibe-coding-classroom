<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정유하의 지오메트리 대시</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* 시작 화면 */
        #startScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .title-container {
            text-align: center;
            margin-bottom: 50px;
            animation: titleFloat 2s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .student-name {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd700;
        }

        .game-title {
            color: #fff;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff;
            letter-spacing: 3px;
        }

        .game-subtitle {
            color: #ff6b6b;
            font-size: 20px;
            margin-top: 10px;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .play-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffd700);
            color: #1a1a2e;
            border: none;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
            transition: all 0.3s;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 107, 107, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 107, 107, 0.9); }
        }

        .play-btn:hover {
            transform: scale(1.1) !important;
        }

        /* 별 배경 */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* 단계 선택 화면 */
        #levelScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99;
        }

        .level-title {
            color: #ffd700;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 0 0 15px #ffd700;
        }

        .level-subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 50px;
        }

        .level-cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-card {
            width: 200px;
            padding: 30px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .level-card:hover {
            transform: scale(1.08) translateY(-5px);
        }

        .level-card.easy {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 0 30px rgba(56, 239, 125, 0.4);
        }

        .level-card.hard {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            box-shadow: 0 0 30px rgba(255, 210, 0, 0.4);
        }

        .level-card.extreme {
            background: linear-gradient(135deg, #cb2d3e, #ef473a);
            box-shadow: 0 0 30px rgba(239, 71, 58, 0.4);
        }

        .level-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .level-name {
            color: white;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .level-desc {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            line-height: 1.4;
        }

        .level-stars {
            font-size: 20px;
            margin-top: 10px;
        }

        .back-btn {
            margin-top: 40px;
            background: transparent;
            color: #aaa;
            border: 2px solid #aaa;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: white;
            border-color: white;
        }

        /* 게임 화면 */
        #gameScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 50;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 15px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 60;
            pointer-events: none;
        }

        .hud-box {
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 8px 18px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #progressBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 14px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
            z-index: 60;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #00f5ff, #ff6b6b);
            transition: width 0.1s;
            width: 0%;
        }

        #progressText {
            position: fixed;
            bottom: 38px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 13px;
            font-weight: bold;
            display: none;
            z-index: 60;
        }

        /* 오버레이 패널 */
        .overlay-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #302b63);
            border: 3px solid #ffd700;
            border-radius: 25px;
            padding: 40px 50px;
            text-align: center;
            z-index: 200;
            display: none;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            min-width: 320px;
        }

        .overlay-panel h2 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px #ffd700;
        }

        .overlay-panel p {
            color: #ddd;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .overlay-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
        }

        .overlay-btn:hover {
            transform: scale(1.05);
        }

        .btn-retry {
            background: linear-gradient(45deg, #ff6b6b, #ee0979);
            color: white;
        }

        .btn-levels {
            background: linear-gradient(45deg, #4776e6, #8e54e9);
            color: white;
        }

        .btn-next {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        #overlay-bg {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 190;
            display: none;
        }

        .attempts-count {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<!-- 별 배경 -->
<div class="stars" id="stars"></div>

<!-- 시작 화면 -->
<div id="startScreen">
    <div class="title-container" style="position:relative;z-index:1;">
        <div class="student-name">⭐ 정유하의 게임 ⭐</div>
        <div class="game-title">GEOMETRY DASH</div>
        <div class="game-subtitle">🔥 점프하고 살아남아라! 🔥</div>
    </div>
    <button class="play-btn" onclick="showLevelScreen()" style="position:relative;z-index:1;">▶ PLAY</button>
    <div style="position:relative;z-index:1;color:#888;font-size:13px;margin-top:25px;">
        스페이스바 / 클릭 / 터치로 점프
    </div>
</div>

<!-- 단계 선택 화면 -->
<div id="levelScreen">
    <div class="level-title" style="position:relative;z-index:1;">🎮 단계 선택</div>
    <div class="level-subtitle" style="position:relative;z-index:1;">원하는 단계를 선택하세요!</div>
    <div class="level-cards" style="position:relative;z-index:1;">
        <div class="level-card easy" onclick="startGame(1)">
            <div class="level-icon">😊</div>
            <div class="level-name">1단계</div>
            <div class="level-desc">가장 쉬움<br>천천히 즐겨봐요!</div>
            <div class="level-stars">⭐</div>
        </div>
        <div class="level-card hard" onclick="startGame(2)">
            <div class="level-icon">😤</div>
            <div class="level-name">2단계</div>
            <div class="level-desc">어려움<br>집중력이 필요해요!</div>
            <div class="level-stars">⭐⭐⭐</div>
        </div>
        <div class="level-card extreme" onclick="startGame(3)">
            <div class="level-icon">💀</div>
            <div class="level-name">3단계</div>
            <div class="level-desc">엄청 어려움<br>전설의 플레이어만!</div>
            <div class="level-stars">⭐⭐⭐⭐⭐</div>
        </div>
    </div>
    <button class="back-btn" onclick="showStartScreen()">← 뒤로</button>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
    <canvas id="gameCanvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hud-box" id="hudLevel">1단계</div>
    <div class="hud-box" id="hudAttempts">시도: 1</div>
    <div class="hud-box" id="hudBest">최고: 0%</div>
</div>

<div id="progressText">진행도: 0%</div>
<div id="progressBar"><div id="progressFill"></div></div>

<!-- 오버레이 -->
<div id="overlay-bg"></div>
<div id="overlay-panel" class="overlay-panel">
    <h2 id="overlay-title">💀 실패!</h2>
    <p id="overlay-msg">다시 도전해봐요!</p>
    <div class="attempts-count" id="overlay-attempts"></div>
    <button class="overlay-btn btn-retry" onclick="retryGame()">🔄 다시 시도</button>
    <button class="overlay-btn btn-levels" onclick="goToLevels()">📋 단계 선택</button>
    <button class="overlay-btn btn-next" id="btnNext" onclick="nextLevel()" style="display:none;">➡️ 다음 단계</button>
</div>

<script>
// =============================================
// 전역 변수
// =============================================
let canvas, ctx;
let gameState = 'idle'; // idle, playing, dead, clear
let currentLevel = 1;
let attempts = 1;
let bestPercent = [0, 0, 0];
let animId = null;
let keys = {};

// =============================================
// 화면 전환 함수
// =============================================
function showStartScreen() {
    document.getElementById('startScreen').style.display = 'flex';
    document.getElementById('levelScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';
    hideOverlay();
    stopGame();
}

function showLevelScreen() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('levelScreen').style.display = 'flex';
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';
    hideOverlay();
    stopGame();
}

function goToLevels() {
    showLevelScreen();
}

function showOverlay(title, msg, showNext) {
    document.getElementById('overlay-title').textContent = title;
    document.getElementById('overlay-msg').textContent = msg;
    document.getElementById('overlay-attempts').textContent = '시도 횟수: ' + attempts + '회';
    document.getElementById('btnNext').style.display = showNext ? 'block' : 'none';
    document.getElementById('overlay-bg').style.display = 'block';
    document.getElementById('overlay-panel').style.display = 'block';
}

function hideOverlay() {
    document.getElementById('overlay-bg').style.display = 'none';
    document.getElementById('overlay-panel').style.display = 'none';
}

function retryGame() {
    hideOverlay();
    attempts++;
    initGame(currentLevel);
}

function nextLevel() {
    hideOverlay();
    if (currentLevel < 3) {
        currentLevel++;
        attempts = 1;
        initGame(currentLevel);
    } else {
        showLevelScreen();
    }
}

// =============================================
// 별 배경 생성
// =============================================
function createStars() {
    const starsDiv = document.getElementById('stars');
    starsDiv.innerHTML = '';
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        starsDiv.appendChild(star);
    }
}
createStars();

// =============================================
// 게임 엔진
// =============================================
let W, H;
let player;
let obstacles;
let portals;
let particles;
let bgX;
let levelProgress;
let levelLength;
let gameSpeed;
let gravity;
let groundY;
let ceilingY;
let bgColors;
let bgColorIdx;
let bgTransition;
let shipMode; // false = cube, true = ship
let shipGravDir; // 1 = down, -1 = up (ship mode)
let currentBgColor;
let nextBgColor;
let flashTimer;
let deathParticles;
let clearStars;
let levelData;

// 레벨별 설정
const LEVEL_CONFIG = {
    1: { speed: 5.5, name: '1단계', color1: '#4776e6', color2: '#38ef7d' },
    2: { speed: 7.5, name: '2단계', color1: '#f7971e', color2: '#ee0979' },
    3: { speed: 10, name: '3단계', color1: '#cb2d3e', color2: '#8e54e9' }
};

function startGame(level) {
    currentLevel = level;
    attempts = 1;
    document.getElementById('levelScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressText').style.display = 'block';
    hideOverlay();
    initGame(level);
}

function stopGame() {
    if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
    }
    gameState = 'idle';
}

function initGame(level) {
    if (animId) cancelAnimationFrame(animId);

    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;

    groundY = H * 0.75;
    ceilingY = H * 0.05;

    gameSpeed = LEVEL_CONFIG[level].speed;
    gravity = 0.65;

    shipMode = false;
    shipGravDir = 1;

    bgX = 0;
    bgColors = ['#1a1a2e', '#0f0c29', '#302b63', '#1a2a4a', '#2d1b4e'];
    bgColorIdx = 0;
    currentBgColor = bgColors[0];
    nextBgColor = bgColors[1];
    bgTransition = 0;
    flashTimer = 0;

    particles = [];
    deathParticles = [];
    clearStars = [];

    levelLength = 8000; // 맵 길이
    levelProgress = 0;

    // 플레이어
    player = {
        x: 120,
        y: groundY - 44,
        w: 40,
        h: 40,
        vy: 0,
        vx: 0,
        onGround: false,
        rotation: 0,
        color: '#00f5ff',
        trail: [],
        dead: false,
        shipTrail: []
    };

    // 레벨 생성
    obstacles = [];
    portals = [];
    generateLevel(level);

    // HUD 업데이트
    updateHUD();

    gameState = 'playing';
    gameLoop();
}

function generateLevel(level) {
    obstacles = [];
    portals = [];

    const sp = gameSpeed;

    if (level === 1) {
        // 1단계: 쉬운 장애물
        let x = 600;
        const patterns = [
            () => { // 단순 삼각형
                addSpike(x, groundY);
                x += 150;
            },
            () => { // 블록
                addBlock(x, groundY - 40, 40, 40);
                x += 180;
            },
            () => { // 작은 간격
                addSpike(x, groundY);
                addSpike(x + 60, groundY);
                x += 200;
            },
            () => { // 위 장애물
                addCeilingSpike(x, groundY);
                x += 160;
            }
        ];

        // 포탈 추가 (1000px 근처)
        portals.push({ x: 950, y: groundY - 100, w: 30, h: 120, type: 'ship', active: true });
        portals.push({ x: 1600, y: groundY - 100, w: 30, h: 120, type: 'cube', active: true });

        for (let i = 0; i < 30; i++) {
            const p = patterns[Math.floor(Math.random() * patterns.length)];
            p();
            x += 80 + Math.random() * 80;
        }

        // 포탈 이후 추가 장애물
        x = 1700;
        for (let i = 0; i < 20; i++) {
            const p = patterns[Math.floor(Math.random() * patterns.length)];
            p();
            x += 80 + Math.random() * 100;
        }

    } else if (level === 2) {
        // 2단계: 중간 난이도
        let x = 400;

        portals.push({ x: 800, y: groundY - 120, w: 30, h: 140, type: 'ship', active: true });
        portals.push({ x: 1600, y: groundY - 120, w: 30, h: 140, type: 'cube', active: true });
        portals.push({ x: 2800, y: groundY - 120, w: 30, h: 140, type: 'ship', active: true });
        portals.push({ x: 3600, y: groundY - 120, w: 30, h: 140, type: 'cube', active: true });

        const patterns = [
            () => {
                addSpike(x, groundY);
                addSpike(x + 50, groundY);
                x += 160;
            },
            () => {
                addBlock(x, groundY - 80, 40, 80);
                x += 200;
            },
            () => {
                addSpike(x, groundY);
                addBlock(x + 80, groundY - 40, 40, 40);
                addSpike(x + 140, groundY);
                x += 240;
            },
            () => {
                addCeilingSpike(x, groundY);
                addSpike(x + 80, groundY);
                x += 200;
            },
            () => {
                addBlock(x, groundY - 80, 80, 80);
                addSpike(x + 100, groundY);
                x += 220;
            }
        ];

        for (let i = 0; i < 60; i++) {
            patterns[Math.floor(Math.random() * patterns.length)]();
            x += 50 + Math.random() * 60;
        }

    } else if (level === 3) {
        // 3단계: 극한 난이도
        let x = 300;

        portals.push({ x: 600, y: groundY - 130, w: 30, h: 150, type: 'ship', active: true });
        portals.push({ x: 1400, y: groundY - 130, w: 30, h: 150, type: 'cube', active: true });
        portals.push({ x: 2200, y: groundY - 130, w: 30, h: 150, type: 'ship', active: true });
        portals.push({ x: 3000, y: groundY - 130, w: 30, h: 150, type: 'cube', active: true });
        portals.push({ x: 4000, y: groundY - 130, w: 30, h: 150, type: 'ship', active: true });
        portals.push({ x: 5000, y: groundY - 130, w: 30, h: 150, type: 'cube', active: true });

        const patterns = [
            () => {
                addSpike(x, groundY); addSpike(x+40, groundY); addSpike(x+80, groundY);
                x += 160;
            },
            () => {
                addBlock(x, groundY-120, 40, 120);
                addSpike(x+60, groundY);
                addBlock(x+110, groundY-80, 40, 80);
                x += 200;
            },
            () => {
                addCeilingSpike(x, groundY); addCeilingSpike(x+60, groundY);
                addSpike(x+30, groundY); addSpike(x+90, groundY);
                x += 200;
            },
            () => {
                addBlock(x, groundY-80, 80, 80);
                addSpike(x+100, groundY); addSpike(x+140, groundY);
                addBlock(x+190, groundY-80, 40, 80);
                x += 260;
            },
            () => {
                addSpike(x, groundY); addSpike(x+45, groundY);
                addBlock(x+100, groundY-40, 40, 40);
                addSpike(x+160, groundY); addSpike(x+200, groundY);
                x += 280;
            }
        ];

        for (let i = 0; i < 100; i++) {
            patterns[Math.floor(Math.random() * patterns.length)]();
            x += 20 + Math.random() * 40;
        }
    }

    levelLength = Math.max(...obstacles.map(o => o.x + 60), ...portals.map(p => p.x + 50), 5000) + 500;
}

function addSpike(x, groundY) {
    obstacles.push({ type: 'spike', x: x, y: groundY - 40, w: 40, h: 40 });
}

function addCeilingSpike(x, groundY) {
    obstacles.push({ type: 'ceilingSpike', x: x, y: ceilingY + 30, w: 40, h: 40 });

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 2,
            life: 1,
            color: color,
            size: Math.random() * 5 + 2
        });
    }
}
