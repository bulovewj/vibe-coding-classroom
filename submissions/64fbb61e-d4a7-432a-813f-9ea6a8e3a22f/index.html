<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정유하의 지오메트리 대시</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Arial', sans-serif; overflow: hidden; }
  
  #menuScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #menuScreen h1 {
    font-size: 48px; color: #fff;
    text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
    margin-bottom: 10px; letter-spacing: 3px;
    animation: glow 2s infinite alternate;
  }
  #menuScreen .subtitle {
    font-size: 18px; color: #aaa; margin-bottom: 40px;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px #e94560, 0 0 20px #e94560; }
    to { text-shadow: 0 0 20px #ff6b9d, 0 0 50px #ff6b9d, 0 0 80px #ff6b9d; }
  }
  .levelCard {
    width: 300px; padding: 25px; margin: 10px;
    border-radius: 20px; cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: center; border: 3px solid transparent;
  }
  .levelCard:hover { transform: scale(1.05); }
  .level1Card {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    box-shadow: 0 0 20px rgba(86,171,47,0.5);
    border-color: #56ab2f;
  }
  .level2Card {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    box-shadow: 0 0 20px rgba(247,151,30,0.5);
    border-color: #f7971e;
  }
  .level3Card {
    background: linear-gradient(135deg, #e94560, #c2185b);
    box-shadow: 0 0 20px rgba(233,69,96,0.5);
    border-color: #e94560;
  }
  .levelCard h2 { font-size: 26px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
  .levelCard p { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 8px; }
  .levelCard .stars { font-size: 22px; margin-top: 5px; }

  #gameScreen {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  }
  #gameCanvas { display: block; }

  #hud {
    position: fixed; top: 10px; left: 0; width: 100%;
    display: none; flex-direction: row; justify-content: space-between;
    align-items: center; padding: 5px 20px; z-index: 10; pointer-events: none;
  }
  #hudLeft { color: #fff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
  #progressBar {
    width: 300px; height: 14px; background: rgba(255,255,255,0.2);
    border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4);
  }
  #progressFill {
    height: 100%; width: 0%; background: linear-gradient(90deg, #56ab2f, #ffd200);
    border-radius: 7px; transition: width 0.1s;
  }
  #hudRight { color: #fff; font-size: 16px; text-shadow: 1px 1px 3px #000; pointer-events: all; }
  #backBtn {
    background: rgba(255,255,255,0.2); border: 2px solid #fff;
    color: #fff; padding: 5px 15px; border-radius: 10px;
    cursor: pointer; font-size: 14px; font-weight: bold;
    pointer-events: all;
  }
  #backBtn:hover { background: rgba(255,255,255,0.4); }

  #overlayScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); display: none;
    flex-direction: column; align-items: center; justify-content: center; z-index: 200;
  }
  #overlayTitle {
    font-size: 60px; font-weight: bold; color: #fff;
    text-shadow: 0 0 20px currentColor; margin-bottom: 20px;
  }
  #overlayMsg { font-size: 22px; color: #ddd; margin-bottom: 30px; }
  .overlayBtn {
    padding: 14px 40px; margin: 8px; font-size: 18px; font-weight: bold;
    border: none; border-radius: 15px; cursor: pointer; transition: transform 0.2s;
  }
  .overlayBtn:hover { transform: scale(1.05); }
  .retryBtn { background: linear-gradient(135deg, #e94560, #c2185b); color: #fff; }
  .menuBtn { background: linear-gradient(135deg, #56ab2f, #a8e063); color: #fff; }
  .nextBtn { background: linear-gradient(135deg, #f7971e, #ffd200); color: #fff; }

  #studentName {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 12px; z-index: 5; pointer-events: none;
  }
</style>
</head>
<body>

<div id="studentName">정유하</div>

<!-- 메뉴 화면 -->
<div id="menuScreen">
  <h1>🎮 지오메트리 대시</h1>
  <p class="subtitle">정유하의 게임 — 단계를 선택하세요!</p>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="levelCard level1Card" onclick="startGame(1)">
      <h2>⭐ 1단계</h2>
      <p class="stars">★☆☆</p>
      <p>쉬운 장애물, 천천히 시작!</p>
    </div>
    <div class="levelCard level2Card" onclick="startGame(2)">
      <h2>🔥 2단계</h2>
      <p class="stars">★★☆</p>
      <p>빠른 속도, 포탈 등장!</p>
    </div>
    <div class="levelCard level3Card" onclick="startGame(3)">
      <h2>💀 3단계</h2>
      <p class="stars">★★★</p>
      <p>엄청 빠르고 어려운 도전!</p>
    </div>
  </div>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hudLeft">🏃 <span id="attemptTxt">시도: 1</span></div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="hudRight"><button id="backBtn" onclick="goMenu()">메뉴</button></div>
</div>

<!-- 오버레이(죽음/클리어) -->
<div id="overlayScreen">
  <div id="overlayTitle"></div>
  <div id="overlayMsg"></div>
  <div>
    <button class="overlayBtn retryBtn" onclick="retryGame()">🔄 다시 시도</button>
    <button class="overlayBtn nextBtn" id="nextLevelBtn" onclick="nextLevel()" style="display:none;">➡️ 다음 단계</button>
    <button class="overlayBtn menuBtn" onclick="goMenu()">🏠 메뉴</button>
  </div>
</div>

<script>
// ============================================================
//  전역 변수
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, GROUND_Y;
let gameLevel = 1;
let gameRunning = false;
let animId = null;
let attempts = 1;
let totalLength = 4000; // 맵 전체 길이(픽셀 단위)

// 플레이어
let player = {};
// 카메라
let camX = 0;
// 장애물/포탈 목록
let obstacles = [];
let portals = [];
// 파티클
let particles = [];
// 배경 별
let stars = [];

// 게임 상태
let gameMode = 'cube'; // 'cube' | 'ship' | 'ufo'
let isFlying = false; // ship/ufo 모드에서 위로 가는 중

// 입력
let keys = { space: false, up: false };
let justPressed = false; // 점프 트리거용

// 속도 설정 (단계별)
const SPEEDS = { 1: 4, 2: 6, 3: 8.5 };
const JUMP_V = { 1: -13, 2: -15, 3: -16 };
const GRAVITY = { 1: 0.55, 2: 0.7, 3: 0.85 };

let speed, jumpVelocity, gravity;
let playerY_velocity = 0;
let onGround = false;
let jumpCount = 0; // 더블점프용 (큐브모드)

// ============================================================
//  리사이즈
// ============================================================
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND_Y = H - 80;
}

// ============================================================
//  메뉴/게임 전환
// ============================================================
function goMenu() {
  gameRunning = false;
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('menuScreen').style.display = 'flex';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('overlayScreen').style.display = 'none';
}

function startGame(level) {
  gameLevel = level;
  attempts = 1;
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('overlayScreen').style.display = 'none';
  resize();
  initGame();
}

function retryGame() {
  attempts++;
  document.getElementById('overlayScreen').style.display = 'none';
  initGame();
}

function nextLevel() {
  if (gameLevel < 3) {
    gameLevel++;
    attempts = 1;
    document.getElementById('overlayScreen').style.display = 'none';
    initGame();
  } else {
    goMenu();
  }
}

// ============================================================
//  게임 초기화
// ============================================================
function initGame() {
  resize();
  speed = SPEEDS[gameLevel];
  jumpVelocity = JUMP_V[gameLevel];
  gravity = GRAVITY[gameLevel];

  camX = 0;
  gameMode = 'cube';
  playerY_velocity = 0;
  onGround = true;
  jumpCount = 0;
  isFlying = false;
  particles = [];

  // 플레이어 초기화
  player = {
    x: 120,
    y: GROUND_Y - 50,
    w: 42,
    h: 42,
    rotation: 0,
    alive: true,
    color: '#00e5ff'
  };

  // 별 생성
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * totalLength,
      y: Math.random() * (H * 0.7),
      r: Math.random() * 2 + 0.5,
      bright: Math.random()
    });
  }

  // 장애물 / 포탈 생성
  generateLevel(gameLevel);

  // HUD 업데이트
  document.getElementById('attemptTxt').textContent = '시도: ' + attempts;

  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

// ============================================================
//  레벨 생성
// ============================================================
function generateLevel(lv) {
  obstacles = [];
  portals = [];

  const mapLen = totalLength;
  let x = 600;

  // 레벨별 패턴 생성
  if (lv === 1) {
    // 1단계: 단순 스파이크, 낮은 블록
    while (x < mapLen - 400) {
      let r = Math.random();
      if (r < 0.45) {
        // 단일 스파이크
        obstacles.push({ type: 'spike', x: x, y: GROUND_Y, w: 36, h: 44 });
        x += 180 + Math.random() * 200;
      } else if (r < 0.75) {
        // 블록
        let bh = 44 + Math.random() * 30;
        obstacles.push({ type: 'block', x: x, y: GROUND_Y - bh + 44, w: 44, h: bh, color: '#ff6b6b' });
        x += 200 + Math.random() * 180;
      } else {
        // 더블 스파이크
        obstacles.push({ type: 'spike', x: x, y: GROUND_Y, w: 36, h: 44 });
        obstacles.push({ type: 'spike', x: x + 40, y: GROUND_Y, w: 36, h: 44 });
        x += 250 + Math.random() * 200;
      }
    }
    // 포탈 없음 (1단계)
  }

  if (lv === 2) {
    // 2단계: 더 촘촘, 포탈 2개
    while (x < mapLen - 400) {
      let r = Math.random();
      if (r < 0.3) {
        obstacles.push({ type: 'spike', x: x, y: GROUND_Y, w: 36, h: 44 });
        x += 130 + Math.random() * 130;
      } else if (r < 0.5) {
        // 공중 블록
        let bh = 44;
        let by = GROUND_Y - 120;
        obstacles.push({ type: 'block', x: x, y: by, w: 44, h: bh, color: '#a855f7' });
        x += 160 + Math.random() * 120;
      } else if (r < 0.7) {
        // 3연속 스파이크
        for (let i = 0; i < 3; i++) {
          obstacles.push({ type: 'spike', x: x + i * 38, y: GROUND_Y, w: 36, h: 44 });
        }
        x += 300 + Math.random() * 150;
      } else if (r < 0.85) {
        // 블록 위 스파이크
        let bh = 44;
        obstacles.push({ type: 'block', x: x, y: GROUND_Y - bh + 44, w: 44, h: bh, color: '#f472b6' });
        obstacles.push({ type: 'spike', x: x + 4, y: GROUND_Y - bh, w: 36, h: 44 });
        x += 220 + Math.random() * 150;
      } else {
        obstacles.push({ type: 'spike', x: x, y: GROUND_Y, w: 36, h: 44 });
        obstacles.push({ type: 'spike', x: x + 40, y: GROUND_Y, w: 36, h: 44 });
        obstacles.push({ type: 'spike', x: x + 80, y: GROUND_Y, w: 36, h: 44 });
        x += 350 + Math.random() * 200;
      }
    }
    // 포탈 2개 (Ship 모드)
    portals.push({ x: mapLen * 0.35, y: GROUND_Y - 140, w: 40, h: 120, mode: 'ship', color: '#00e5ff' });
    portals.push({ x: mapLen * 0.65, y: GROUND_Y - 140, w: 40, h: 120, mode: 'cube', color: '#ff9800' });
  }

  if (lv === 3) {
    // 3단계: 매우 촘촘, 포탈 3개, UFO 모드
    while (x < mapLen - 400) {
      let r = Math.random();
      if (r < 0.25) {
        obstacles.push({ type: 'spike', x: x, y: GROUND_Y, w: 36, h: 44 });
        x += 90 + Math.random() * 80;
      } else if (r < 0.45) {
        for (let i = 0; i < 4; i++) {
          obstacles.push({ type: 'spike', x: x + i * 38, y: GROUND_Y, w: 36, h: 44 });
        }
        x += 280 + Math.random() * 100;
      } else if (r < 0.6) {
        // 천장 스파이크
        obstacles.push({ type: 'ceilSpike', x: x, y: 80, w: 36, h: 44 });
        x += 120 + Math.random() * 100;
      } else if (r < 0.75) {
        // 블록 + 위 스파이크
        let bh = 60;
        obstacles.push({ type: 'block', x: x, y: GROUND_Y - bh + 44, w: 44, h: bh, color: '#ef4444' });
        obstacles.push({ type: 'spike', x: x + 4, y: GROUND_Y - bh, w: 36, h: 44 });
        x += 160 + Math.random() * 100;
      } else if (r < 0.88) {
        // 5연속 스파이크
        for (let i = 0; i < 5; i++) {
          obstacles.push({ type: 'spike', x: x + i * 38, y: GROUND_Y, w: 36, h: 44 });
        }
        x += 400 + Math.random() * 150;
      } else {
        // 공중 블록 미로
        obstacles.push({ type: 'block', x: x, y: GROUND_Y - 160, w: 44, h: 44, color: '#8b5cf6' });
        obstacles.push({ type: 'spike', x: x + 50, y: GROUND_Y, w: 36, h: 44 });
        x += 200 + Math.random() * 100;
      }
    }
    // 포탈 3개
    portals.push({ x: mapLen * 0.25, y: GROUND_Y - 140, w: 40, h: 120, mode: 'ship', color: '#00e5ff' });
    portals.push({ x: mapLen * 0.5, y: GROUND_Y - 140, w: 40, h: 120, mode: 'ufo', color: '#a855f7' });
    portals.push({ x: mapLen * 0.75, y: GROUND_Y - 140, w: 40, h: 120, mode: 'cube', color: '#ff9800' });
  }
}

// ============================================================
//  메인 루프
// ============================================================
function loop() {
  if (!gameRunning) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ============================================================
//  업데이트
// ============================================================
function update() {
  if (!player.alive) return;

  let inputDown = keys.space || keys.up;

  // 모드별 물리
  if (gameMode === 'cube') {
    // 중력
    playerY_velocity += gravity;
    player.y += playerY_velocity;

    // 바닥
    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      playerY_velocity = 0;
      onGround = true;
      jumpCount = 0;
    } else {
      onGround = false;
    }

    // 천장
    if (player.y <= 60) {
      player.y = 60;
      playerY_velocity = 2;
    }

    // 점프
    if (justPressed) {
      if (onGround || jumpCount < 1) {
        playerY_velocity = jumpVelocity;
        jumpCount++;
        spawnJumpParticles();
      }
      justPressed = false;
    }

    // 회전
    if (!onGround) {
      player.rotation += speed * 2.2;
    } else {
      player.rotation = Math.round(player.rotation / 90) * 90;
    }

  } else if (gameMode === 'ship') {
    // Ship: 누르면 위로, 놓으면 중력
    if (inputDown) {
      playerY_velocity -= 0.4;
    } else {
      playerY_velocity += 0.3;
    }
    playerY_velocity = Math.max(-6, Math.min(6, playerY_velocity));
    player.y += playerY_velocity;

    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      playerY_velocity = 0;
    }
    if (player.y <= 60) {
      player.y = 60;
      playerY_velocity = 1;
    }
    player.rotation = playerY_velocity * 4;
    justPressed = false;

  } else if (gameMode === 'ufo') {
    // UFO: 누를 때마다 위로 점프
    playerY_velocity += 0.5;
    player.y += playerY_velocity;

    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      playerY_velocity = 0;
    }
    if (player.y <= 60) {
      player.y = 60;
      playerY_velocity = 1;
    }

    if (justPressed) {
      playerY_velocity = jumpVelocity * 0.7;
      justPressed = false;
    } else {
      justPressed = false;
    }
    player.rotation += 3;
  }

  // 카메라
  let targetCam = player.x - W * 0.25;
  camX += (targetCam - camX) * 0.15;
  if (camX < 0) camX = 0;

  // 진행도
  let progress = Math.min(100, (camX / (totalLength - W)) * 100);
  document.getElementById('progressFill').style.width = progress + '%';

  // 장애물 충돌
  for (let ob of obstacles) {
    if (checkCollision(player, ob)) {
      die();
      return;
    }
  }

  // 포탈 충돌
  for (let p of portals) {
    if (checkPortalCollision(player, p)) {
      activatePortal(p);
    }
  }

  // 클리어 판정
  if (camX >= totalLength - W - 100) {
    gameRunning = false;
    setTimeout(() => showClear(), 300);
  }

  // 파티클 업데이트
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    p.alpha = p.life / p.maxLife;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
//  충돌
// ============================================================
function checkCollision(pl, ob) {
  if (ob.type === 'spike') {
    // 스파이크는 삼각형 근사 충돌 (AABB 축소)
    let sx = ob.x - camX;
    let px = pl.x, py = pl.y;
    let shrink = 8;
    if (px + pl.w - shrink < sx + 5) return false;
    if (px + shrink > sx + ob.w - 5) return false;
    if (py + pl.h - shrink < ob.y - ob.h + 5) return false;
    if (py + shrink > ob.y) return false;
    // 삼각형 내부 판정 (간단)
    let cx = (px + pl.w / 2);
    let cy = (py + pl.h);
    let tipX = (ob.x - camX) + ob.w / 2;
    let tipY = ob.y - ob.h;
    let dist = Math.abs(cx - (ob.x - camX + ob.w / 2));
    let threshold = ob.w / 2 - (cy - tipY) / ob.h * (ob.w / 2);
    return dist < threshold + 2;
  } else if (ob.type === 'ceilSpike') {
    // 천장 스파이크 (아래 방향)
    let sx = ob.x - camX;
    let shrink = 8;
    if (pl.x + pl.w - shrink < sx + 5) return false;
    if (pl.x + shrink > sx + ob.w - 5) return false;
    if (pl.y + shrink > ob.y + ob.h - 5) return false;
    if (pl.y + pl.h - shrink < ob.y) return false;
    return true;
  } else if (ob.type === 'block') {
    let bx = ob.x - camX;
    let shrink = 4;
    return pl.x + pl.w - shrink > bx &&
           pl.x + shrink < bx + ob.w &&
           pl.y + pl.h - shrink > ob.y - ob.h &&
           pl.y + shrink < ob.y;
  }
  return false;
}

function checkPortalCollision(pl, p) {
  let px = p.x - camX;
  return pl.x + pl.w > px && pl.x < px + p.w &&
         pl.y + pl.h > p.y && pl.y < p.y + p.h;
}

function activatePortal(p) {
  if (gameMode !== p.mode) {
    gameMode = p.mode;
    playerY_velocity = 0;
    spawnPortalParticles(player.x, player.y + player.h / 2);
  }
}

// ============================================================
//  죽음 / 클리어
// ============================================================
function die() {
  player.alive = false;
  gameRunning = false;
  spawnDeathParticles();
  // 마지막 파티클 그린 후 오버레이
  setTimeout(() => {
    let ov = document.getElementById('overlayScreen');
    document.getElementById('overlayTitle').textContent = '💥 충돌!';
    document.getElementById('overlayTitle').style.color = '#e94560';
    let prog = Math.min(100, Math.round((camX / (totalLength - W)) * 100));
    document.getElementById('overlayMsg').textContent = '진행도: ' + prog + '% | 시도 횟수: ' + attempts;
    document.getElementById('nextLevelBtn').style.display = 'none';
    ov.style.display = 'flex';
  }, 500);
}

function showClear() {
  let ov = document.getElementById('overlayScreen');
  document.getElementById('overlayTitle').textContent = '🎉 클리어!';
  document.getElementById('overlayTitle').style.color = '#56ab2f';
  document.getElementById('overlayMsg').textContent =
    gameLevel === 3 ? '모든 단계 완료! 대단해요! 🏆' : '다음 단계에 도전해보세요!';
  let nextBtn = document.getElementById('nextLevelBtn');
  if (gameLevel < 3) {
    nextBtn.style.display = 'inline-block';
  } else {
    nextBtn.style.display = 'none';
  }
  ov.style.display = 'flex';
}
