<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김일의 나만의 일기장</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffeaa7 100%);
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
      padding: 20px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(255,154,158,0.4);
    }

    .header h1 {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 2.8em;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 5px;
    }

    .header p {
      color: #fff8f0;
      font-size: 1em;
    }

    .emoji-title {
      font-size: 2em;
    }

    .main-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* 왼쪽 패널 - 작성 폼 */
    .write-panel {
      flex: 1;
      min-width: 300px;
      background: #fffef5;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      border: 3px solid #ffd89b;
    }

    .write-panel h2 {
      font-size: 1.4em;
      color: #e67e22;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      color: #7f8c8d;
      font-size: 0.9em;
      margin-bottom: 6px;
    }

    .form-group input[type="date"],
    .form-group input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #ffd89b;
      border-radius: 12px;
      font-size: 1em;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      color: #333;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #ff9a9e;
    }

    .weather-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .weather-btn {
      padding: 8px 12px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 1.3em;
      transition: all 0.2s;
    }

    .weather-btn:hover {
      transform: scale(1.15);
    }

    .weather-btn.selected {
      border-color: #ff9a9e;
      background: #ffe0e6;
      transform: scale(1.15);
    }

    .mood-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mood-btn {
      padding: 8px 12px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 1.3em;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75em;
      gap: 3px;
    }

    .mood-btn span.emoji {
      font-size: 1.8em;
    }

    .mood-btn:hover {
      transform: scale(1.1);
    }

    .mood-btn.selected {
      border-color: #a29bfe;
      background: #ede7ff;
      transform: scale(1.1);
    }

    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #ffd89b;
      border-radius: 12px;
      font-size: 1em;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 1.1em;
      background: repeating-linear-gradient(
        transparent,
        transparent 27px,
        #fde8cc 27px,
        #fde8cc 28px
      );
      line-height: 28px;
      resize: vertical;
      min-height: 180px;
      outline: none;
      color: #333;
      transition: border-color 0.3s;
    }

    .form-group textarea:focus {
      border-color: #ff9a9e;
    }

    .char-count {
      text-align: right;
      font-size: 0.8em;
      color: #aaa;
      margin-top: 4px;
    }

    .sticker-section label {
      display: block;
      font-weight: 700;
      color: #7f8c8d;
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    .sticker-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .sticker-item {
      font-size: 1.8em;
      cursor: pointer;
      padding: 5px;
      border-radius: 8px;
      transition: transform 0.2s;
      user-select: none;
    }

    .sticker-item:hover {
      transform: scale(1.3);
      background: rgba(255,255,255,0.7);
    }

    .selected-stickers {
      min-height: 40px;
      border: 2px dashed #ffd89b;
      border-radius: 12px;
      padding: 8px;
      font-size: 1.5em;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      background: #fffbf0;
      cursor: pointer;
      position: relative;
    }

    .selected-stickers::after {
      content: '(클릭하면 지워져요)';
      font-size: 0.5em;
      color: #ccc;
      position: absolute;
      right: 8px;
      bottom: 4px;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(255,154,158,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,154,158,0.5);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    /* 오른쪽 패널 - 일기 목록 */
    .list-panel {
      flex: 1;
      min-width: 300px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      border-radius: 15px;
      padding: 15px 20px;
      box-shadow: 0 4px 15px rgba(161,140,209,0.3);
    }

    .list-header h2 {
      color: white;
      font-size: 1.3em;
    }

    .diary-count {
      background: rgba(255,255,255,0.3);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 700;
    }

    .diary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .diary-list::-webkit-scrollbar {
      width: 6px;
    }

    .diary-list::-webkit-scrollbar-thumb {
      background: #fad0c4;
      border-radius: 3px;
    }

    .diary-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 5px solid #ff9a9e;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .diary-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .diary-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .diary-date {
      font-size: 0.85em;
      color: #999;
      font-weight: 700;
    }

    .diary-meta {
      display: flex;
      gap: 5px;
      font-size: 1.1em;
    }

    .diary-title {
      font-weight: 700;
      color: #333;
      font-size: 1em;
      margin-bottom: 6px;
    }

    .diary-preview {
      font-size: 0.9em;
      color: #777;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .diary-stickers {
      font-size: 1.2em;
      margin-top: 6px;
    }

    .btn-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ffb3ba;
      color: white;
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      opacity: 0;
    }

    .diary-card:hover .btn-delete {
      opacity: 1;
    }

    .btn-delete:hover {
      background: #ff6b7a;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #ccc;
      font-size: 1em;
    }

    .empty-state .empty-emoji {
      font-size: 3em;
      display: block;
      margin-bottom: 10px;
    }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fffef5;
      border-radius: 24px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.3s ease;
      position: relative;
      border: 3px solid #ffd89b;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-date {
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 5px;
    }

    .modal-meta {
      font-size: 1.4em;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 1.5em;
      font-weight: 700;
      color: #e67e22;
      margin-bottom: 15px;
      font-family: 'Nanum Pen Script', cursive;
    }

    .modal-body {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 1.2em;
      color: #444;
      line-height: 1.8;
      background: repeating-linear-gradient(
        transparent,
        transparent 27px,
        #fde8cc 27px,
        #fde8cc 28px
      );
      padding: 12px;
      border-radius: 10px;
      min-height: 100px;
      white-space: pre-wrap;
    }

    .modal-stickers {
      font-size: 1.8em;
      margin-top: 15px;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #ff9a9e;
      color: white;
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
