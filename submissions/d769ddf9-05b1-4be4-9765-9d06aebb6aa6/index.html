<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정유하의 우주 수학 모험</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jua', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    background: #000010;
  }

  /* ===== 별 배경 ===== */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ===== 공통 화면 ===== */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.5s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ===== 시작 화면 ===== */
  #start-screen {
    background: transparent;
  }

  .student-name {
    font-size: 1.4rem;
    color: #aef;
    letter-spacing: 3px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #7bf;
  }

  .title-text {
    font-size: 3rem;
    color: #fff;
    text-shadow: 0 0 20px #9bf, 0 0 40px #6af;
    margin-bottom: 10px;
    text-align: center;
  }

  .subtitle {
    font-size: 1.1rem;
    color: #88ccff;
    margin-bottom: 50px;
    text-shadow: 0 0 8px #4af;
  }

  /* 행성들 */
  .planet {
    position: fixed;
    border-radius: 50%;
    z-index: 1;
    animation: floatPlanet 6s ease-in-out infinite;
  }
  .planet1 {
    width: 120px; height: 120px;
    background: radial-gradient(circle at 35% 35%, #ff9966, #cc3300);
    bottom: 80px; right: 80px;
    box-shadow: 0 0 30px #ff6600, inset -20px -10px 40px #660000;
    animation-delay: 0s;
  }
  .planet2 {
    width: 80px; height: 80px;
    background: radial-gradient(circle at 35% 35%, #99ccff, #3366cc);
    top: 100px; left: 60px;
    box-shadow: 0 0 20px #3366ff, inset -15px -8px 30px #003399;
    animation-delay: 2s;
  }
  .planet3 {
    width: 55px; height: 55px;
    background: radial-gradient(circle at 35% 35%, #ffcc44, #cc6600);
    top: 200px; right: 150px;
    box-shadow: 0 0 15px #ffaa00, inset -10px -5px 20px #884400;
    animation-delay: 4s;
  }
  /* 토성 고리 */
  .planet1::after {
    content: '';
    position: absolute;
    width: 170px; height: 30px;
    border: 8px solid rgba(255,150,80,0.5);
    border-radius: 50%;
    top: 45px; left: -25px;
    transform: rotateX(70deg);
  }

  @keyframes floatPlanet {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* UFO */
  .ufo {
    position: fixed;
    z-index: 2;
    animation: ufoFly 12s linear infinite;
    top: 30%;
  }
  .ufo-body {
    width: 60px; height: 25px;
    background: radial-gradient(ellipse, #aaf, #66f);
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 15px #88f;
  }
  .ufo-dome {
    width: 30px; height: 20px;
    background: radial-gradient(ellipse, #ccffff, #66ccff);
    border-radius: 50% 50% 0 0;
    position: absolute;
    top: -15px; left: 15px;
    box-shadow: 0 0 10px #0ff;
  }
  .ufo-light {
    width: 8px; height: 8px;
    background: #ff0;
    border-radius: 50%;
    position: absolute;
    bottom: -4px;
    animation: blink 0.5s alternate infinite;
  }
  .ufo-light:nth-child(1) { left: 10px; }
  .ufo-light:nth-child(2) { left: 25px; animation-delay: 0.17s; }
  .ufo-light:nth-child(3) { left: 40px; animation-delay: 0.34s; }

  @keyframes ufoFly {
    0% { left: -100px; }
    100% { left: 110%; }
  }
  @keyframes blink {
    from { opacity: 1; }
    to { opacity: 0.2; }
  }

  /* 트로피 카운터 (시작화면) */
  .trophy-counter-start {
    position: fixed;
    top: 18px; right: 22px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,40,0.7);
    border: 2px solid #ffcc00;
    border-radius: 30px;
    padding: 6px 14px;
    z-index: 20;
    color: #ffdd00;
    font-size: 1.1rem;
    box-shadow: 0 0 12px #ffaa00;
  }

  /* 시작 버튼 */
  #start-btn {
    font-family: 'Jua', sans-serif;
    font-size: 1.8rem;
    padding: 18px 60px;
    background: linear-gradient(135deg, #6600ff, #0066ff);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #6600ff, 0 0 60px #0066ff50;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulseStar 2s ease-in-out infinite;
  }
  #start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px #8800ff, 0 0 80px #0088ff80;
  }
  @keyframes pulseStar {
    0%,100% { box-shadow: 0 0 30px #6600ff, 0 0 60px #0066ff50; }
    50% { box-shadow: 0 0 50px #9900ff, 0 0 100px #0099ff70; }
  }

  /* ===== 게임 화면 ===== */
  #game-screen {
    background: linear-gradient(180deg, #000020 0%, #001030 60%, #000820 100%);
    flex-direction: column;
    justify-content: flex-start;
    padding: 10px;
  }

  /* 상단 HUD */
  .hud {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  /* 목숨 */
  .lives-box {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,60,0.6);
    border: 2px solid #ff4466;
    border-radius: 20px;
    padding: 5px 12px;
  }
  .heart { font-size: 1.3rem; filter: drop-shadow(0 0 5px #f46); }
  .lives-text { color: #ff7799; font-size: 1.1rem; }

  /* 트로피 HUD */
  .trophy-box {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(40,30,0,0.7);
    border: 2px solid #ffcc00;
    border-radius: 20px;
    padding: 5px 12px;
    color: #ffdd00;
    font-size: 1.1rem;
    box-shadow: 0 0 10px #ffaa00;
  }

  /* 문제 카운터 바 (동그라미 10개) */
  .progress-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,60,0.5);
    border: 2px solid #446;
    border-radius: 30px;
    padding: 6px 14px;
  }
  .prog-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #558;
    background: #112;
    transition: all 0.3s;
    position: relative;
  }
  .prog-dot.done {
    background: #44ff88;
    border-color: #00ff66;
    box-shadow: 0 0 10px #00ff66, 0 0 20px #00ff6680;
  }
  .prog-dot.boss {
    background: #ff4400;
    border-color: #ff8800;
    box-shadow: 0 0 15px #ff6600, 0 0 30px #ff440080;
    animation: bossPulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes bossPulse {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
  }

  /* 타이머 */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .timer-bar-bg {
    width: 250px; height: 18px;
    background: #111;
    border-radius: 10px;
    border: 2px solid #336;
    overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    transition: width 0.1s linear, background 0.5s;
  }
  .timer-bar-fill.warn { background: linear-gradient(90deg, #ff8800, #ff4400); }
  .timer-num {
    color: #aef;
    font-size: 1.1rem;
    min-width: 35px;
  }

  /* 문제 영역 */
  .question-area {
    background: rgba(0,20,60,0.85);
    border: 3px solid #4488ff;
    border-radius: 24px;
    padding: 28px 40px;
    text-align: center;
    box-shadow: 0 0 30px #2255ff50;
    max-width: 650px;
    width: 100%;
    margin-bottom: 16px;
  }

  .question-label {
    font-size: 1rem;
    color: #88aaff;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 2.4rem;
    color: #fff;
    text-shadow: 0 0 15px #8af;
    margin-bottom: 6px;
  }

  .boss-label {
    font-size: 1rem;
    color: #ff8800;
    text-shadow: 0 0 10px #ff4400;
    animation: bossPulse 0.7s alternate infinite;
  }

  /* 보기 버튼 */
  .choices-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 650px;
    width: 100%;
  }

  .choice-btn {
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    padding: 16px;
    border: 3px solid #446;
    border-radius: 18px;
    background: rgba(0,20,60,0.7);
    color: #cce;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
    box-shadow: 0 4px 15px #0005;
  }
  .choice-btn:hover {
    transform: scale(1.04);
    background: rgba(30,60,150,0.85);
    border-color: #88aaff;
    color: #fff;
  }
  .choice-btn.correct {
    background: rgba(0,180,80,0.7);
    border-color: #00ff88;
    color: #fff;
    box-shadow: 0 0 20px #00ff88;
  }
  .choice-btn.wrong {
    background: rgba(200,30,30,0.7);
    border-color: #ff4444;
    color: #fff;
    box-shadow: 0 0 20px #ff4444;
  }

  /* 문제 번호 */
  .question-num {
    color: #aae;
    font-size: 0.95rem;
    margin-top: 8px;
  }

  /* ===== 트로피 획득 화면 ===== */
  #trophy-screen {
    background: radial-gradient(ellipse, #1a0040, #000015);
  }
  .trophy-big {
    font-size: 7rem;
    animation: trophySpin 1.5s ease-in-out;
    display: inline-block;
    filter: drop-shadow(0 0 30px #ffcc00);
  }
  @keyframes trophySpin {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .trophy-msg {
    font-size: 2rem;
    color: #ffee44;
    text-shadow: 0 0 20px #ffaa00;
    margin-top: 16px;
  }

  /* ===== 게임 오버 화면 ===== */
  #gameover-screen {
    background: radial-gradient(ellipse, #200010, #000010);
  }
  .gameover-title {
    font-size: 3rem;
    color: #ff4466;
    text-shadow: 0 0 20px #ff0044;
    margin-bottom: 20px;
  }
  .gameover-sub {
    font-size: 1.3rem;
    color: #ff8899;
    margin-bottom: 30px;
  }
  #restart-btn {
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    padding: 14px 50px;
    background: linear-gradient(135deg, #cc0033, #ff4466);
    color: #fff;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff0044;
    transition: transform 0.2s;
  }
  #restart-btn:hover { transform: scale(1.07); }

  /* 파티클 */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    animation: particleFly 0.8s ease-out forwards;
  }
  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* 정답/오답 오버레이 */
  .feedback-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-overlay.show-correct {
    background: radial-gradient(ellipse, rgba(0,255,100,0.15), transparent 70%);
    opacity: 1;
  }
  .feedback-overlay.show-wrong {
    background: radial-gradient(ellipse, rgba(255,50,50,0.2), transparent 70%);
    opacity: 1;
  }

  /* 흔들기 애니메이션 */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="feedback-overlay" id="feedback-overlay"></div>

<!-- 행성들 -->
<div class="planet planet1"></div>
<div class="planet planet2"></div>
<div class="planet planet3"></div>

<!-- UFO -->
<div class="ufo">
  <div class="ufo-body">
    <div class="ufo-dome"></div>
    <div class="ufo-light"></div>
    <div class="ufo-light"></div>
    <div class="ufo-light"></div>
  </div>
</div>

<!-- 트로피 (항상 표시) -->
<div class="trophy-counter-start" id="trophy-counter">
  🏆 <span id="trophy-count">0</span>개
</div>

<!-- ===== 시작 화면 ===== -->
<div class="screen" id="start-screen">
  <div class="student-name">✨ 정유하의 우주 수학 모험 ✨</div>
  <div class="title-text">🚀 우주 수학 퀴즈 🚀</div>
  <div class="subtitle">5학년 수학 | 분수 덧셈·뺄셈 & 소수 곱셈</div>
  <button id="start-btn" onclick="startGame()">🌟 시작하기 🌟</button>
</div>

<!-- ===== 게임 화면 ===== -->
<div class="screen hidden" id="game-screen">
  <div class="hud">
    <div class="hud-top">
      <!-- 목숨 -->
      <div class="lives-box">
        <span class="heart">❤️</span>
        <span class="lives-text" id="lives-display">3.0</span>
      </div>
      <!-- 문제 번호 -->
      <div class="question-num" id="q-num-display">문제 1 / 30</div>
      <!-- 트로피 -->
      <div class="trophy-box">🏆 <span id="trophy-count-game">0</span></div>
    </div>

    <!-- 진행 바 (10개 점) -->
    <div class="progress-bar" id="progress-bar"></div>

    <!-- 타이머 -->
    <div class="timer-wrap">
      <div class="timer-bar-bg">
        <div class="timer-bar-fill" id="timer-fill"></div>
      </div>
      <div class="timer-num" id="timer-num">30</div>
    </div>
  </div>

  <!-- 문제 -->
  <div class="question-area" id="question-area">
    <div class="question-label" id="q-label">분수의 덧셈</div>
    <div class="boss-label" id="boss-label" style="display:none">🔥 보스 문제! 🔥</div>
    <div class="question-text" id="q-text">문제 로딩중...</div>
  </div>

  <!-- 보기 -->
  <div class="choices-wrap" id="choices-wrap">
    <button class="choice-btn" onclick="checkAnswer(0)"></button>
    <button class="choice-btn" onclick="checkAnswer(1)"></button>
    <button class="choice-btn" onclick="checkAnswer(2)"></button>
    <button class="choice-btn" onclick="checkAnswer(3)"></button>
  </div>
</div>

<!-- ===== 트로피 획득 화면 ===== -->
<div class="screen hidden" id="trophy-screen">
  <div class="trophy-big">🏆</div>
  <div class="trophy-msg">트로피를 획득했습니다!</div>
</div>

<!-- ===== 게임 오버 화면 ===== -->
<div class="screen hidden" id="gameover-screen">
  <div class="gameover-title">💫 우주 표류 중... 💫</div>
  <div class="gameover-sub" id="gameover-sub">목숨이 다 떨어졌어요!</div>
  <button id="restart-btn" onclick="goToStart()">🚀 다시 시작하기</button>
</div>

<script>
// ===== 별 배경 =====
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.5 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005
    });
  }
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.alpha += s.twinkleSpeed;
    if (s.alpha > 1 || s.alpha < 0) s.twinkleSpeed *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${Math.abs(Math.sin(s.alpha))})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

resizeCanvas();
initStars();
animateStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ===== 게임 상태 =====
let lives = 3.0;
let trophies = 0;
let currentQ = 0; // 0~29
let timerInterval = null;
let timeLeft = 30;
let correctAnswer = null;
let answered = false;

// 정답 처리 잠금
let locked = false;

// ===== 화면 전환 =====
function showScreen(id) {
  ['start-screen','game-screen','trophy-screen','gameover-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (s === id) {
      el.classList.remove('hidden');
    } else {
      el.classList.add('hidden');
    }
  });
}

// ===== 게임 시작 =====
function startGame() {
  lives = 3.0;
  currentQ = 0;
  updateTrophyDisplay();
  showScreen('game-screen');
  buildProgressBar();
  loadQuestion();
}

function updateTrophyDisplay() {
  document.getElementById('trophy-count').textContent = trophies;
  document.getElementById('trophy-count-game').textContent = trophies;
}

// ===== 진행 바 =====
function buildProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.classList.add('prog-dot');
    dot.id = `dot-${i}`;
    bar.appendChild(dot);
  }
}

function updateProgressBar() {
  for (let i = 0; i < 10; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.classList.remove('done', 'boss');
    const globalIdx = Math.floor(currentQ / 10) * 10 + i;
    if (i === 9) {
      // 10번째는 보스
      if (currentQ > globalIdx) dot.classList.add('done');
      else if (currentQ === globalIdx) dot.classList.add('boss');
    } else {
      if (currentQ > globalIdx) dot.classList.add('done');
    }
  }
}

// ===== 문제 생성 =====
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function genFractionAdd() {
  // 5-1 분수 덧셈 (진분수+진분수, 같은분모 또는 쉬운 다른분모)
  const denoms = [2,3,4,5,6,8,10];
  let d = denoms[Math.floor(Math.random() * denoms.length)];
  // 같은 분모
  let n1 = Math.floor(Math.random() * (d - 2)) + 1;
  let n2 = Math.floor(Math.random() * (d - 1 - n1)) + 1;
  // 합이 d 미만이 되도록 (진분수 결과)
  if (n1 + n2 >= d) { n2 = Math.max(1, d - n1 - 1); }
  if (n2 < 1) { n1 = 1; n2 = 1; if (d <= 2) d = 4; }
  const ansN = n1 + n2;
  const g = gcd(ansN, d);
  const simplN = ansN / g, simplD = d / g;
  const ansStr = simplD === 1 ? `${simplN}` : `${simplN}/${simplD}`;
  const question = `${n1}/${d} + ${n2}/${d} = ?`;
  return { label: '분수의 덧셈', question, answer: ansStr, ansNum: ansN/d };
}

function genFractionSub() {
  const denoms = [2,3,4,5,6,8,10];
  let d = denoms[Math.floor(Math.random() * denoms.length)];
  let n1 = Math.floor(Math.random() * (d - 1)) + 2;
  let n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
  const ansN = n1 - n2;
  if (ansN <= 0) { return genFractionSub(); }
  const g = gcd(ansN, d);
  const simplN = ansN / g, simplD = d / g;
  const ansStr = simplD === 1 ? `${simplN}` : `${simplN}/${simplD}`;
