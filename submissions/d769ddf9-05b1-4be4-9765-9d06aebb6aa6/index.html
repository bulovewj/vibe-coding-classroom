<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정유하의 수학 우주 탐험</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    background: #000;
  }

  /* ===== 별 배경 ===== */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at center, #0a0020 0%, #000 100%);
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.2; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.3); }
  }

  /* 행성들 */
  .planet {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
  }

  #planet1 {
    width: 180px; height: 180px;
    background: radial-gradient(circle at 35% 35%, #ff9a3c, #c0392b, #7b0000);
    bottom: -40px; left: -30px;
    box-shadow: 0 0 40px #ff6b0080;
    animation: float1 6s ease-in-out infinite;
  }

  #planet2 {
    width: 120px; height: 120px;
    background: radial-gradient(circle at 35% 35%, #a8edea, #43b89c, #1a5276);
    top: 40px; right: 60px;
    box-shadow: 0 0 30px #43b89c80;
    animation: float2 8s ease-in-out infinite;
  }

  #planet3 {
    width: 80px; height: 80px;
    background: radial-gradient(circle at 35% 35%, #f9ca24, #f0932b, #6a3093);
    bottom: 100px; right: 150px;
    box-shadow: 0 0 20px #f9ca2480;
    animation: float3 5s ease-in-out infinite;
  }

  @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(15px)} }
  @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* UFO */
  #ufo {
    position: absolute;
    font-size: 60px;
    top: 20%;
    left: 10%;
    animation: ufoFloat 4s ease-in-out infinite;
    z-index: 2;
    filter: drop-shadow(0 0 15px #00ffcc);
  }

  @keyframes ufoFloat {
    0%,100%{transform:translateY(0) rotate(-5deg)}
    50%{transform:translateY(-25px) rotate(5deg)}
  }

  /* ===== 시작 화면 ===== */
  #startScreen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .student-name {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #00ffcc;
    z-index: 11;
  }

  .game-title {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #a29bfe, 0 0 40px #6c5ce7;
    margin-bottom: 12px;
    text-align: center;
    z-index: 11;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100%{text-shadow:0 0 20px #a29bfe,0 0 40px #6c5ce7}
    50%{text-shadow:0 0 30px #fd79a8,0 0 60px #e84393}
  }

  .subtitle {
    color: #dfe6e9;
    font-size: 18px;
    margin-bottom: 50px;
    text-shadow: 0 0 10px #74b9ff;
    z-index: 11;
  }

  .start-btn {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
    color: white;
    border: none;
    padding: 20px 60px;
    font-size: 26px;
    font-weight: 900;
    border-radius: 60px;
    cursor: pointer;
    z-index: 11;
    box-shadow: 0 0 30px #a29bfe80, 0 8px 30px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 3px;
    animation: btnGlow 2s ease-in-out infinite;
  }

  .start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px #fd79a8, 0 8px 40px rgba(0,0,0,0.6);
  }

  @keyframes btnGlow {
    0%,100%{box-shadow:0 0 30px #a29bfe80,0 8px 30px rgba(0,0,0,0.5)}
    50%{box-shadow:0 0 50px #fd79a880,0 8px 30px rgba(0,0,0,0.5)}
  }

  /* 트로피 표시 (시작 화면) */
  #trophyDisplay {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    background: rgba(255,255,255,0.1);
    border: 2px solid #f9ca24;
    border-radius: 20px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #f9ca24;
    font-size: 20px;
    font-weight: 900;
    backdrop-filter: blur(5px);
    box-shadow: 0 0 15px #f9ca2460;
  }

  /* ===== 게임 화면 ===== */
  #gameScreen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 12px 16px;
  }

  /* 상단 HUD */
  #hud {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 11;
  }

  #hudTop {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  /* 목숨 */
  #livesDisplay {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .heart {
    font-size: 28px;
    transition: all 0.3s;
    filter: drop-shadow(0 0 6px #e84393);
  }

  .heart.empty {
    filter: grayscale(1) opacity(0.3);
  }

  /* 점수 */
  #scoreDisplay {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    text-shadow: 0 0 10px #74b9ff;
  }

  /* 트로피 (게임 중) */
  #trophyGameDisplay {
    color: #f9ca24;
    font-size: 18px;
    font-weight: 900;
    text-shadow: 0 0 10px #f9ca24;
  }

  /* 진행 바 (동그라미 10개) */
  #progressBar {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: rgba(255,255,255,0.08);
    border-radius: 30px;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .progress-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.4s;
    position: relative;
  }

  .progress-dot.done {
    background: linear-gradient(135deg, #00b894, #00cec9);
    border-color: #00cec9;
    box-shadow: 0 0 10px #00cec9;
  }

  .progress-dot.boss {
    border-color: #fd79a8;
    background: rgba(253,121,168,0.15);
  }

  .progress-dot.boss.done {
    background: linear-gradient(135deg, #fd79a8, #e84393);
    border-color: #fd79a8;
    box-shadow: 0 0 15px #fd79a8, 0 0 30px #e84393;
    animation: bossGlow 1s infinite alternate;
  }

  @keyframes bossGlow {
    0%{box-shadow:0 0 10px #fd79a8}
    100%{box-shadow:0 0 25px #fd79a8,0 0 40px #e84393}
  }

  /* 문제 카드 */
  #questionCard {
    z-index: 11;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    padding: 30px 40px;
    margin-top: 18px;
    width: 100%;
    max-width: 700px;
    text-align: center;
    box-shadow: 0 0 40px rgba(108,92,231,0.3);
  }

  #questionLabel {
    color: #a29bfe;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  #questionText {
    color: #fff;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    margin-bottom: 18px;
    text-shadow: 0 0 20px #a29bfe;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 타이머 바 */
  #timerBarWrap {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  #timerBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00b894, #fdcb6e, #e17055);
    border-radius: 10px;
    transition: width 0.1s linear;
  }

  #timerText {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
    text-align: right;
  }

  /* 보기 버튼들 */
  #choicesGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 700px;
    z-index: 11;
    margin-top: 14px;
  }

  .choice-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    color: #fff;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 900;
    padding: 18px 10px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(5px);
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  .choice-btn:hover {
    background: rgba(162,155,254,0.3);
    border-color: #a29bfe;
    transform: scale(1.04);
    box-shadow: 0 0 20px rgba(162,155,254,0.5);
  }

  .choice-btn.correct {
    background: rgba(0,184,148,0.4) !important;
    border-color: #00b894 !important;
    box-shadow: 0 0 25px #00b894 !important;
    transform: scale(1.06) !important;
  }

  .choice-btn.wrong {
    background: rgba(225,112,85,0.4) !important;
    border-color: #e17055 !important;
    box-shadow: 0 0 25px #e17055 !important;
    animation: shake 0.4s;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-8px)}
    40%,80%{transform:translateX(8px)}
  }

  /* 보스 문제 표시 */
  #bossAlert {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    z-index: 200;
    background: linear-gradient(135deg, #6c5ce7, #e84393);
    color: white;
    font-size: 32px;
    font-weight: 900;
    padding: 30px 50px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 0 60px #e84393;
    animation: popIn 0.4s ease;
  }

  @keyframes popIn {
    0%{transform:translate(-50%,-50%) scale(0.3);opacity:0}
    100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  }

  /* 트로피 획득 */
  #trophyAlert {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    z-index: 300;
    background: linear-gradient(135deg, #f9ca24, #f0932b);
    color: #2d3436;
    font-size: 30px;
    font-weight: 900;
    padding: 40px 60px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 0 80px #f9ca24, 0 0 120px #f0932b;
    animation: popIn 0.4s ease;
  }

  /* 게임오버 */
  #gameOverScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 200;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #gameOverScreen h2 {
    color: #e17055;
    font-size: 52px;
    font-weight: 900;
    text-shadow: 0 0 30px #e17055;
    margin-bottom: 16px;
    animation: titlePulse 1s infinite;
  }

  #gameOverScreen p {
    color: #fff;
    font-size: 22px;
    margin-bottom: 40px;
  }

  .retry-btn {
    background: linear-gradient(135deg, #6c5ce7, #fd79a8);
    color: white;
    border: none;
    padding: 16px 50px;
    font-size: 22px;
    font-weight: 900;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px #6c5ce7;
    transition: transform 0.2s;
    letter-spacing: 2px;
    margin: 8px;
  }

  .retry-btn:hover { transform: scale(1.07); }

  /* 정답/오답 플래시 */
  #flashOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  /* 피드백 텍스트 */
  #feedbackText {
    position: fixed;
    top: 45%;
    left: 50%;
    transform: translate(-50%,-50%);
    z-index: 150;
    font-size: 52px;
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* 별 파티클 */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    z-index: 500;
    animation: particleFly 1s ease-out forwards;
  }

  @keyframes particleFly {
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
  }
</style>
</head>
<body>

<!-- 별 배경 -->
<div id="starfield"></div>

<!-- 행성들 -->
<div class="planet" id="planet1"></div>
<div class="planet" id="planet2"></div>
<div class="planet" id="planet3"></div>

<!-- UFO -->
<div id="ufo">🛸</div>

<!-- 트로피 (항상 오른쪽 위) -->
<div id="trophyDisplay">🏆 <span id="trophyCount">0</span>개</div>

<!-- ===== 시작 화면 ===== -->
<div id="startScreen">
  <div class="student-name">✨ 정유하의 수학 우주 탐험 ✨</div>
  <div class="game-title">🚀 수학 우주 탐험 🪐</div>
  <div class="subtitle">소수의 곱셈 & 분수의 덧셈·뺄셈</div>
  <button class="start-btn" onclick="startGame()">🌟 시작하기 🌟</button>
</div>

<!-- ===== 게임 화면 ===== -->
<div id="gameScreen">
  <div id="hud">
    <div id="hudTop">
      <div id="livesDisplay">
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
        <span class="heart" id="h3">❤️</span>
      </div>
      <div id="scoreDisplay">문제: <span id="qNum">1</span>/30</div>
      <div id="trophyGameDisplay">🏆 <span id="trophyGameCount">0</span></div>
    </div>
    <div id="progressBar"></div>
  </div>

  <div id="questionCard">
    <div id="questionLabel">📡 문제를 풀어라!</div>
    <div id="questionText">준비 중...</div>
    <div id="timerBarWrap">
      <div id="timerBar"></div>
    </div>
    <div id="timerText">⏱️ 30초</div>
  </div>

  <div id="choicesGrid">
    <button class="choice-btn" id="btn0" onclick="checkAnswer(0)"></button>
    <button class="choice-btn" id="btn1" onclick="checkAnswer(1)"></button>
    <button class="choice-btn" id="btn2" onclick="checkAnswer(2)"></button>
    <button class="choice-btn" id="btn3" onclick="checkAnswer(3)"></button>
  </div>
</div>

<!-- 보스 경고 -->
<div id="bossAlert">🔥 도전 문제! 🔥<br><span style="font-size:18px">틀리면 목숨 2.9개 감소!</span></div>

<!-- 트로피 획득 -->
<div id="trophyAlert">🏆 트로피를 획득했습니다! 🏆<br>🌟 대단해요, 정유하! 🌟</div>

<!-- 게임오버 -->
<div id="gameOverScreen">
  <h2>💥 게임 오버 💥</h2>
  <p id="gameOverMsg">목숨이 모두 사라졌어요!</p>
  <button class="retry-btn" onclick="restartGame()">🔄 다시 도전!</button>
  <button class="retry-btn" onclick="goHome()" style="background:linear-gradient(135deg,#00b894,#00cec9);box-shadow:0 0 30px #00b894">🏠 처음으로</button>
</div>

<!-- 플래시 오버레이 -->
<div id="flashOverlay"></div>
<div id="feedbackText"></div>

<script>
  // ===== 별 생성 =====
  const starfield = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    starfield.appendChild(s);
  }

  // ===== 게임 상태 =====
  let lives = 3;           // 실제 목숨 (0~3, 소수 가능)
  let score = 0;
  let questionNum = 0;     // 현재 문제 번호 (0-indexed)
  let trophies = 0;
  let timerInterval = null;
  let timeLeft = 30;
  let currentAnswer = null;
  let isBossQuestion = false;
  let canAnswer = false;
  let answered = false;

  // ===== 진행 바 생성 (30개) =====
  function buildProgressBar() {
    const bar = document.getElementById('progressBar');
    bar.innerHTML = '';
    for (let i = 0; i < 30; i++) {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      dot.id = 'dot' + i;
      // 10번째, 20번째, 30번째(idx 9,19,29)는 보스
      if (i === 9 || i === 19 || i === 29) {
        dot.className += ' boss';
        dot.innerHTML = '⚡';
        dot.title = '도전 문제!';
      } else {
        dot.innerHTML = (i+1);
        dot.style.fontSize = '9px';
      }
      bar.appendChild(dot);
    }
  }

  function updateProgressBar() {
    for (let i = 0; i < 30; i++) {
      const dot = document.getElementById('dot' + i);
      if (i < questionNum) {
        dot.classList.add('done');
      } else {
        dot.classList.remove('done');
      }
    }
  }

  // ===== 목숨 업데이트 =====
  function updateLives() {
    const heartIds = ['h1','h2','h3'];
    for (let i = 0; i < 3; i++) {
      const h = document.getElementById(heartIds[i]);
      if (lives >= (i + 1)) {
        h.classList.remove('empty');
        h.textContent = '❤️';
      } else if (lives > i && lives < (i+1)) {
        // 반 깍인 상태 (소수 목숨)
        h.classList.remove('empty');
        h.textContent = '🫀';
      } else {
        h.classList.add('empty');
        h.textContent = '🖤';
      }
    }
  }

  // ===== 문제 생성 =====
  // 소수의 곱셈 (5-2학기)
  function makeDecimalMultiply(boss) {
    if (boss) {
      // 조금 더 어렵게
      const a = (Math.floor(Math.random()*9)+2) / 10 * (Math.floor(Math.random()*4)+2);
      const numA = parseFloat(((Math.floor(Math.random()*18)+2)/10).toFixed(1));
      const numB = Math.floor(Math.random()*8)+2;
      const ans = parseFloat((numA * numB).toFixed(2));
      return {
        question: `${numA} × ${numB} = ?`,
        answer: ans,
        type: 'decimal'
      };
    } else {
      // 쉽게: 0.몇 × 1자리수
      const numA = parseFloat(((Math.floor(Math.random()*9)+1)/10).toFixed(1));
      const numB = Math.floor(Math.random()*9)+1;
      const ans = parseFloat((numA * numB).toFixed(2));
      return {
        question: `${numA} × ${numB} = ?`,
        answer: ans,
        type: 'decimal'
      };
    }
  }

  // 분수의 덧셈/뺄셈 (5-1학기) - 동분모 위주
  function makeFractionAddSub(boss) {
    const ops = ['+', '-'];
    const op = ops[Math.floor(Math.random()*2)];

    let denom, numA, numB, ans, question;

    if (boss) {
      // 이분모 (간단한)
      const denoms = [[2,4],[3,6],[4,8],[2,6],[3,9]];
      const pair = denoms[Math.floor(Math.random()*denoms.length)];
      const d1 = pair[0], d2 = pair[1];
      const lcd = lcm(d1, d2);
      const n1 = Math.floor(Math.random()*3)+1;
      let n2 = Math.floor(Math.random()*3)+1;
      if (op === '-' && (n1/d1) <= (n2/d2)) n2 = 1;

      const an1 = n1 * (lcd/d1);
      const an2 = n2 * (lcd/d2);
      let ansNum = op === '+' ? an1+an2 : an1-an2;
      // 약분
      const g = gcd(Math.abs(ansNum), lcd);
      const ansNumR = ansNum/g;
      const ansDenR = lcd/g;

      const qText = `${n1}/${d1} ${op} ${n2}/${d2}`;
      let ansStr;
      if (ansDenR === 1) ansStr = `${ansNumR}`;
      else if (ansNumR >= ansDenR) {
        const whole = Math.floor(ansNumR/ansDenR);
        const rem = ansNumR % ansDenR;
        ansStr = rem === 0 ? `${whole}` : `${whole} ${rem}/${ansDenR}`;
      } else {
        ansStr = `${ansNumR}/${ansDenR}`;
      }

      return {
        question: `${qText} = ?`,
        answer: ansStr,
        answerNum: ansNum/lcd,
        type: 'fraction',
        ansNum
