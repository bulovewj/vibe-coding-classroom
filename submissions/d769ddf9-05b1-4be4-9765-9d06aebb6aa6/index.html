<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정유하ㅏ의 우주 수학 탐험</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0015;
    color: white;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* 별 배경 */
  #starCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* 행성 장식 */
  .planet1 {
    position: fixed;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff6b9d, #c0392b, #6a0025);
    bottom: -40px; left: -40px;
    box-shadow: 0 0 60px rgba(255,107,157,0.4);
    z-index: 1;
  }
  .planet1::after {
    content: '';
    position: absolute;
    width: 240px; height: 50px;
    border: 12px solid rgba(255,107,157,0.3);
    border-radius: 50%;
    top: 65px; left: -30px;
    transform: rotate(-20deg);
  }
  .planet2 {
    position: fixed;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 30%, #a29bfe, #6c5ce7, #2d1b69);
    top: 60px; right: -20px;
    box-shadow: 0 0 50px rgba(108,92,231,0.5);
    z-index: 1;
  }
  .planet3 {
    position: fixed;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #81ecec, #00cec9, #006060);
    top: 200px; left: 30px;
    box-shadow: 0 0 30px rgba(0,206,201,0.4);
    z-index: 1;
  }

  /* 메인 컨테이너 */
  #app {
    position: relative;
    z-index: 10;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 시작 화면 ===== */
  #startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .student-name {
    font-size: 1rem;
    color: #a29bfe;
    letter-spacing: 3px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .game-title {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fd79a8, #a29bfe, #74b9ff, #55efc4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-shadow: none;
    line-height: 1.2;
  }

  .game-subtitle {
    font-size: 1rem;
    color: #b2bec3;
    margin-bottom: 40px;
  }

  .ufo-icon {
    font-size: 5rem;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(162,155,254,0.8));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
  }

  .start-btn {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    border: none;
    color: white;
    font-size: 1.4rem;
    font-weight: 700;
    padding: 18px 60px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(108,92,231,0.6), 0 0 60px rgba(108,92,231,0.3);
    transition: all 0.3s;
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
  }

  .start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(108,92,231,0.9), 0 0 80px rgba(108,92,231,0.5);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(108,92,231,0.6), 0 0 60px rgba(108,92,231,0.3); }
    50% { box-shadow: 0 0 50px rgba(162,155,254,0.9), 0 0 80px rgba(162,155,254,0.5); }
  }

  /* ===== 게임 화면 ===== */
  #gameScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 600px;
    padding: 10px 20px;
  }

  /* 상단 HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px 16px;
    backdrop-filter: blur(10px);
  }

  .hud-lives {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 1.3rem;
  }

  .heart {
    font-size: 1.4rem;
    transition: all 0.3s;
  }
  .heart.lost {
    filter: grayscale(1);
    opacity: 0.3;
  }

  .hud-score {
    font-size: 1rem;
    font-weight: 700;
    color: #ffeaa7;
    text-align: center;
  }

  .hud-trophy {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 1rem;
    font-weight: 700;
    color: #ffd700;
  }

  /* 진행바 (10문제마다 동그라미) */
  .progress-bar-container {
    width: 100%;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 0.75rem;
    color: #a29bfe;
    margin-bottom: 6px;
    text-align: center;
  }

  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
  }

  .prog-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
    transition: all 0.5s;
    position: relative;
  }

  .prog-dot.filled {
    background: linear-gradient(135deg, #ffd700, #ff9f43);
    border-color: #ffd700;
    color: #fff;
    box-shadow: 0 0 15px rgba(255,215,0,0.7);
    animation: fireDot 1s ease-in-out infinite alternate;
  }

  .prog-dot.current {
    border-color: #a29bfe;
    background: rgba(162,155,254,0.2);
    color: #a29bfe;
    box-shadow: 0 0 10px rgba(162,155,254,0.5);
  }

  @keyframes fireDot {
    0% { box-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,100,0,0.4); }
    100% { box-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 40px rgba(255,100,0,0.6); }
  }

  /* 타이머 */
  .timer-container {
    width: 100%;
    margin-bottom: 12px;
  }

  .timer-bar-bg {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, #00b894, #55efc4);
    border-radius: 10px;
    transition: width 1s linear, background 0.5s;
    width: 100%;
  }

  .timer-bar.warning {
    background: linear-gradient(90deg, #e17055, #fd79a8);
  }

  .timer-text {
    text-align: right;
    font-size: 0.85rem;
    color: #b2bec3;
    margin-top: 3px;
  }

  /* 문제 카드 */
  .question-card {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(162,155,254,0.3);
    border-radius: 24px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 16px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(108,92,231,0.2);
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(162,155,254,0.05) 0%, transparent 70%);
    animation: rotate 8s linear infinite;
  }

  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .question-type-badge {
    display: inline-block;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  .question-type-badge.boss {
    background: linear-gradient(135deg, #e17055, #fd79a8);
    animation: bossGlow 1s ease-in-out infinite alternate;
  }

  @keyframes bossGlow {
    0% { box-shadow: 0 0 10px rgba(225,112,85,0.5); }
    100% { box-shadow: 0 0 25px rgba(253,121,168,0.9); }
  }

  .question-text {
    font-size: 2rem;
    font-weight: 900;
    color: white;
    line-height: 1.4;
    position: relative;
    z-index: 1;
  }

  .question-num {
    font-size: 0.85rem;
    color: #a29bfe;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* 답 입력 */
  .answer-section {
    width: 100%;
    margin-bottom: 16px;
  }

  .answer-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(162,155,254,0.4);
    border-radius: 16px;
    color: white;
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
    padding: 14px;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 2px;
  }

  .answer-input:focus {
    border-color: #a29bfe;
    box-shadow: 0 0 20px rgba(162,155,254,0.4);
    background: rgba(162,155,254,0.1);
  }

  .answer-input::placeholder {
    color: rgba(255,255,255,0.2);
    font-size: 1.2rem;
  }

  /* 숫자패드 */
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 12px;
  }

  .numpad-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 14px 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }

  .numpad-btn:hover, .numpad-btn:active {
    background: rgba(162,155,254,0.3);
    border-color: #a29bfe;
    transform: scale(0.95);
  }

  .numpad-btn.delete {
    background: rgba(225,112,85,0.2);
    border-color: rgba(225,112,85,0.4);
    color: #e17055;
  }

  .numpad-btn.submit {
    grid-column: span 3;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    border: none;
    box-shadow: 0 4px 20px rgba(108,92,231,0.4);
    font-size: 1rem;
    letter-spacing: 1px;
  }

  .numpad-btn.submit:hover {
    box-shadow: 0 4px 30px rgba(108,92,231,0.7);
  }

  .numpad-btn.dot {
    background: rgba(255,255,255,0.08);
  }

  /* 피드백 오버레이 */
  .feedback-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }

  .feedback-text {
    font-size: 4rem;
    font-weight: 900;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s;
  }

  .feedback-text.show {
    opacity: 1;
    transform: scale(1.2);
  }

  .feedback-text.correct {
    color: #55efc4;
    text-shadow: 0 0 30px rgba(85,239,196,0.8);
  }

  .feedback-text.wrong {
    color: #fd79a8;
    text-shadow: 0 0 30px rgba(253,121,168,0.8);
  }

  /* 트로피 화면 */
  #trophyScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 200;
  }

  .trophy-big {
    font-size: 8rem;
    animation: trophyBounce 0.5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.8));
  }

  @keyframes trophyBounce {
    0% { transform: scale(1) rotate(-5deg); }
    100% { transform: scale(1.1) rotate(5deg); }
  }

  .trophy-text {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff9f43);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 20px;
  }

  /* 게임오버 화면 */
  #gameOverScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
  }

  .gameover-icon { font-size: 5rem; margin-bottom: 16px; }
  .gameover-title {
    font-size: 2rem;
    font-weight: 900;
    color: #fd79a8;
    margin-bottom: 8px;
  }
  .gameover-score {
    font-size: 1.1rem;
    color: #b2bec3;
    margin-bottom: 30px;
  }

  .retry-btn {
    background: linear-gradient(135deg, #e17055, #fd79a8);
    border: none;
    color: white;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 16px 50px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(253,121,168,0.5);
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .retry-btn:hover { transform: scale(1.05); }

  /* 파티클 */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 150;
    font-size: 1.5rem;
    animation: particleFly 1s ease-out forwards;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(0.3); }
  }

  /* 보스 문제 경고 */
  .boss-warning {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(225,112,85,0.15);
    z-index: 90;
    pointer-events: none;
    border: 4px solid rgba(253,121,168,0.5);
    animation: bossWarn 0.5s ease-in-out;
    border-radius: 0;
  }

  @keyframes bossWarn {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* 목숨 감소 애니 */
  .life-lost-anim {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    font-weight: 900;
    color: #fd79a8;
    z-index: 200;
    pointer-events: none;
    animation: lifeLost 1s ease-out forwards;
    text-shadow: 0 0 20px rgba(253,121,168,0.8);
  }

  @keyframes lifeLost {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }
  }

  .screen-shake {
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="planet1"></div>
<div class="planet2"></div>
<div class="planet3"></div>

<div id="app">

  <!-- 시작 화면 -->
  <div id="startScreen">
    <div class="student-name">✨ 정유하ㅏ의 우주 수학 탐험 ✨</div>
    <div class="ufo-icon">🛸</div>
    <div class="game-title">우주 수학<br>탐험대</div>
    <div class="game-subtitle">분수와 소수를 마스터하고 트로피를 모아봐! 🏆</div>
    <div style="display:flex;gap:20px;margin-bottom:30px;font-size:0.85rem;color:#b2bec3;text-align:center;">
      <div>❤️ 목숨 3개</div>
      <div>⏱️ 30초 제한</div>
      <div>🔥 10문제마다 보스!</div>
      <div>📝 30문제 완료 → 트로피</div>
    </div>
    <button class="start-btn" onclick="startGame()">🚀 시작하기</button>
    <div id="startTrophyDisplay" style="margin-top:20px;font-size:1rem;color:#ffd700;display:none;">
      🏆 획득한 트로피: <span id="startTrophyCount">0</span>개
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="gameScreen">

    <!-- HUD -->
    <div class="hud">
      <div class="hud-lives" id="livesDisplay">
        <span>❤️</span><span>❤️</span><span>❤️</span>
      </div>
      <div class="hud-score">
        🌟 <span id="scoreDisplay">0</span>점
        <div style="font-size:0.7rem;color:#a29bfe;margin-top:2px;">문제 <span id="qNumDisplay">1</span>/30</div>
      </div>
      <div class="hud-trophy">
        🏆 <span id="trophyCount">0</span>
      </div>
    </div>

    <!-- 진행 바 -->
    <div class="progress-bar-container">
      <div class="progress-label">🔥 10문제마다 보스 등장!</div>
      <div class="progress-dots" id="progressDots">
        <div class="prog-dot current" id="dot0">1</div>
        <div class="prog-dot" id="dot1">10</div>
        <div class="prog-dot" id="dot2">20</div>
        <div class="prog-dot" id="dot3">30</div>
      </div>
    </div>

    <!-- 타이머 -->
    <div class="timer-container">
      <div class="timer-bar-bg">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="timer-text">⏱️ <span id="timerText">30</span>초</div>
    </div>

    <!-- 문제 카드 -->
    <div class="question-card" id="questionCard">
      <div id="questionBadge" class="question-type-badge">분수 덧셈/뺄셈</div>
      <div class="question-text" id="questionText">1/2 + 1/3 = ?</div>
      <div class="question-num" id="questionNum">문제 1번</div>
    </div>

    <!-- 답 입력 -->
    <div class="answer-section">
      <input type="text" id="answerInput" class="answer-input" placeholder="답을 입력하세요" readonly>
    </div>

    <!-- 숫자패드 -->
    <div class="numpad">
      <button class="numpad-btn" onclick="numpadInput('7')">7</button>
      <button class="numpad-btn" onclick="numpadInput('8')">8</button>
      <button class="numpad-btn" onclick="numpadInput('9')">9</button>
      <button class="numpad-btn delete" onclick="numpadDelete()">⌫</button>
      <button class="numpad-btn" onclick="numpadInput('4')">4</button>
      <button class="numpad-btn" onclick="numpadInput('5')">5</button>
      <button class="numpad-btn" onclick="numpadInput('6')">6</button>
      <button class="numpad-btn dot" onclick="numpadInput('.')">.</button>
      <button class="numpad-btn" onclick="numpadInput('1')">1</button>
      <button class="numpad-btn" onclick="numpadInput('2')">2</button>
      <button class="numpad-btn" onclick="numpadInput('3')">3</button>
      <button class="numpad-btn" onclick="numpadInput('/')">⁄</button>
      <button class="numpad-btn" onclick="numpadInput('0')">0</button>
      <button class="numpad-btn submit" onclick="submitAnswer()">✅ 제출</button>
    </div>

  </div>

  <!-- 트로피 화면 -->
  <div id="trophyScreen">
    <div class="trophy-big">🏆</div>
    <div class="trophy-text">트로피를 획득했습니다!</div>
    <div style="font-size:1rem;color:#ffeaa7;margin-top:10px;">총 트로피: <span id="trophyCountBig">1</span>개</div>
  </div>

  <!-- 게임오버 화면 -->
  <div id="gameOverScreen">
    <div class="gameover-icon">💀</div>
    <div class="gameover-title">게임 오버!</div>
    <div class="gameover-score">
      풀었던 문제: <span id="finalQ">0</span>개<br>
      획득한 점수: <span id="finalScore">0</span>점
    </div>
    <button class="retry-btn" onclick="goHome()">🏠 처음으로</button>
  </div>

</div>

<!-- 피드백 -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-text" id="feedbackText"></div>
</div>

<script>
// ===== 별 배경 =====
const starCanvas = document.getElementById('starCanvas');
const ctx = starCanvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 2 + 0.3,
      speed: Math.random() * 0.3 + 0.1,
