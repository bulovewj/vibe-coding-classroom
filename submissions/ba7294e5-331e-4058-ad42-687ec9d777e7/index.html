<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>남태욱의 좀비 슈팅 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Arial', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

  #startScreen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #startScreen h1 {
    font-size: 48px; color: #ff6b35; text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff4500;
    margin-bottom: 10px; animation: pulse 1.5s infinite;
  }
  #startScreen .subtitle { color: #ffd700; font-size: 22px; margin-bottom: 5px; }
  #startScreen .player-name { color: #00ff88; font-size: 28px; font-weight: bold; margin-bottom: 40px; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
  #startBtn {
    padding: 18px 60px; font-size: 28px; background: linear-gradient(45deg, #ff6b35, #ff4500);
    color: white; border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 30px #ff6b35; transition: all 0.2s;
    animation: pulse 1.5s infinite;
  }
  #startBtn:hover { transform: scale(1.1); box-shadow: 0 0 50px #ff6b35; }
  .start-info {
    margin-top: 30px; color: #aaa; font-size: 14px; text-align: center; line-height: 2;
  }
  .start-info span { color: #ffd700; font-weight: bold; }

  #gameContainer {
    position: fixed; inset: 0; display: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 20px; display: none;
    pointer-events: none; z-index: 10;
  }
  #hudTop {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .hud-box {
    background: rgba(0,0,0,0.7); border: 2px solid #ff6b35;
    border-radius: 10px; padding: 8px 14px; color: white; font-size: 14px;
  }
  .hud-box .label { color: #ffd700; font-size: 11px; margin-bottom: 2px; }
  .bar-bg { width: 150px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
  .bar { height: 100%; border-radius: 6px; transition: width 0.2s; }
  #playerHpBar { background: linear-gradient(90deg, #ff4444, #ff8800); }
  #waveInfo { text-align: center; color: #ffd700; font-size: 18px; font-weight: bold; }
  #killCount { color: #00ff88; font-size: 16px; font-weight: bold; }
  #weaponInfo { color: #ff6b35; font-size: 14px; }

  #controls {
    position: fixed; bottom: 20px; left: 20px;
    display: none; z-index: 10;
  }
  .dpad {
    display: grid; grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px; gap: 4px;
  }
  .dpad-btn {
    background: rgba(0,0,0,0.7); border: 2px solid #ff6b35;
    border-radius: 8px; color: white; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
  }
  .dpad-btn:active, .dpad-btn.active { background: rgba(255,107,53,0.5); }
  .dpad-center { grid-column: 2; grid-row: 2; font-size: 12px; color: #ffd700; }

  #shootBtn {
    position: fixed; bottom: 40px; right: 40px;
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle, #ff6b35, #ff4500);
    border: 3px solid #ffd700; color: white; font-size: 14px; font-weight: bold;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    display: none; z-index: 10; box-shadow: 0 0 20px #ff6b35;
    touch-action: none;
  }
  #shootBtn:active { transform: scale(0.9); }

  #waveTimer {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 36px; color: #ffd700; font-weight: bold;
    background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 15px;
    border: 2px solid #ffd700; display: none; z-index: 20; text-align: center;
  }

  #gameOverScreen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #gameOverScreen h2 { font-size: 52px; color: #ff4444; margin-bottom: 20px; text-shadow: 0 0 20px #ff4444; }
  #gameOverScreen .stats { color: #ffd700; font-size: 22px; margin-bottom: 30px; line-height: 2; text-align: center; }
  #restartBtn {
    padding: 15px 50px; font-size: 22px; background: linear-gradient(45deg, #ff6b35, #ff4500);
    color: white; border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 20px #ff6b35;
  }

  #victoryScreen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #victoryScreen h2 { font-size: 52px; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 30px #ffd700; animation: pulse 1s infinite; }
  #victoryScreen .stats { color: #00ff88; font-size: 22px; margin-bottom: 30px; line-height: 2; text-align: center; }
  #victoryRestartBtn {
    padding: 15px 50px; font-size: 22px; background: linear-gradient(45deg, #00cc66, #00ff88);
    color: #1a1a2e; border: none; border-radius: 50px; cursor: pointer;
    font-weight: bold;
  }

  #weaponUpgradeNotif {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.9); border: 3px solid #ffd700;
    padding: 20px 40px; border-radius: 15px; color: #ffd700;
    font-size: 24px; font-weight: bold; text-align: center;
    display: none; z-index: 50;
  }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🧟 좀비 슈팅 🔫</h1>
  <div class="subtitle">학교에서 살아남아라!</div>
  <div class="player-name">👤 남태욱</div>
  <button id="startBtn" onclick="startGame()">🎮 시작하기</button>
  <div class="start-info">
    <span>🔫 권총</span>: 처음 무기 (데미지 20, 쿨타임 1초)<br>
    <span>💥 돌격소총</span>: 10마리 처치 후 해금 (데미지 10, 빠른 연사)<br>
    <span>⚡ 미니건</span>: 50마리 처치 후 해금 (데미지 20, 초고속 연사)<br>
    <span>🏆 목표</span>: 좀비 200마리를 처치하면 승리!<br>
    방향키(좌측 하단) + 발사(우측 하단)
  </div>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="hud">
  <div id="hudTop">
    <div class="hud-box">
      <div class="label">💚 플레이어 체력</div>
      <div class="bar-bg"><div class="bar" id="playerHpBar" style="width:100%"></div></div>
      <div id="playerHpText" style="color:#fff;font-size:12px;margin-top:2px;">100 / 100</div>
    </div>
    <div class="hud-box" style="text-align:center;">
      <div id="waveInfo">웨이브 1</div>
      <div id="killCount">처치: 0 / 200</div>
      <div id="weaponInfo">🔫 권총</div>
    </div>
    <div class="hud-box" style="text-align:right;">
      <div class="label">좀비 남은수</div>
      <div id="zombieCount" style="color:#ff4444;font-size:18px;font-weight:bold;">1</div>
    </div>
  </div>
</div>

<div id="controls">
  <div class="dpad">
    <div></div>
    <div class="dpad-btn" id="btnUp" ontouchstart="keyDown('up')" ontouchend="keyUp('up')" onmousedown="keyDown('up')" onmouseup="keyUp('up')">▲</div>
    <div></div>
    <div class="dpad-btn" id="btnLeft" ontouchstart="keyDown('left')" ontouchend="keyUp('left')" onmousedown="keyDown('left')" onmouseup="keyUp('left')">◀</div>
    <div class="dpad-btn dpad-center">🕹️</div>
    <div class="dpad-btn" id="btnRight" ontouchstart="keyDown('right')" ontouchend="keyUp('right')" onmousedown="keyDown('right')" onmouseup="keyUp('right')">▶</div>
    <div></div>
    <div class="dpad-btn" id="btnDown" ontouchstart="keyDown('down')" ontouchend="keyUp('down')" onmousedown="keyDown('down')" onmouseup="keyUp('down')">▼</div>
    <div></div>
  </div>
</div>

<button id="shootBtn"
  ontouchstart="shootStart()" ontouchend="shootEnd()"
  onmousedown="shootStart()" onmouseup="shootEnd()">🔫<br>발사</button>

<div id="waveTimer"></div>

<div id="gameOverScreen">
  <h2>💀 게임 오버</h2>
  <div class="stats" id="gameOverStats"></div>
  <button id="restartBtn" onclick="restartGame()">🔄 다시 시작</button>
</div>

<div id="victoryScreen">
  <h2>🏆 승리!</h2>
  <div class="stats" id="victoryStats"></div>
  <button id="victoryRestartBtn" onclick="restartGame()">🔄 다시 하기</button>
</div>

<div id="weaponUpgradeNotif"></div>

<script>
// ===================== GAME STATE =====================
var canvas, ctx;
var gameRunning = false;
var gameOver = false;
var victory = false;

// Player
var player = {
  x: 0, y: 0, z: 0,
  hp: 100, maxHp: 100,
  speed: 3,
  angle: 0,
  radius: 18
};

// Camera
var camera = { x: 0, y: 0, z: -8, angle: 0 };

// Keys
var keys = { up: false, down: false, left: false, right: false };

// Weapons
var weapons = {
  pistol: { name: '🔫 권총', damage: 20, cooldown: 1000, autoFire: false, burstDelay: 300, burstCooldown: 1000 },
  rifle:  { name: '💥 돌격소총', damage: 10, cooldown: 300, autoFire: true, holdTime: 1500, burstDelay: 300, burstCooldown: 300 },
  minigun:{ name: '⚡ 미니건', damage: 20, cooldown: 100, autoFire: true, holdTime: 1500, burstDelay: 100, burstCooldown: 100 }
};
var currentWeapon = 'pistol';
var lastShot = 0;
var shootHeld = false;
var shootHeldStart = 0;
var shootInterval = null;
var isBursting = false;

// Zombies
var zombies = [];
var zombieIdCounter = 0;
var wave = 1;
var waveZombieCount = 1;
var totalKills = 0;
var waveCleared = false;
var waveTimerActive = false;
var waveTimerEnd = 0;
var waveTimerCountdown = 0;

// Bullets
var bullets = [];

// World
var worldW = 60, worldH = 40;
var walls = [];
var floor = [];
var decorations = [];

// 3D settings
var FOV = Math.PI / 3;
var rayCount = 120;
var maxDist = 40;

// Raycaster map
var mapW = 30, mapH = 20;
var mapData = [];

// Damage flash
var damageFlash = 0;

// Shoot flash
var shootFlash = 0;

// Sprites
var zombieSprites = [];
var bulletHoles = [];

function initMap() {
  mapData = [];
  for (var y = 0; y < mapH; y++) {
    var row = [];
    for (var x = 0; x < mapW; x++) {
      if (x === 0 || x === mapW-1 || y === 0 || y === mapH-1) {
        row.push(1);
      } else {
        row.push(0);
      }
    }
    mapData.push(row);
  }
  // Add some interior walls (school corridors)
  var interiorWalls = [
    [5,3],[5,4],[5,5],[5,6],
    [10,8],[11,8],[12,8],[13,8],
    [20,3],[20,4],[20,5],[20,6],[20,7],
    [25,12],[25,13],[25,14],
    [8,14],[9,14],[10,14],[11,14],
    [15,3],[16,3],[17,3],
    [22,10],[23,10],[24,10],
  ];
  for (var i = 0; i < interiorWalls.length; i++) {
    var wx = interiorWalls[i][0];
    var wy = interiorWalls[i][1];
    if (wx < mapW && wy < mapH) mapData[wy][wx] = 1;
  }
}

function isWall(x, y) {
  var mx = Math.floor(x);
  var my = Math.floor(y);
  if (mx < 0 || mx >= mapW || my < 0 || my >= mapH) return true;
  return mapData[my][mx] === 1;
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('controls').style.display = 'block';
  document.getElementById('shootBtn').style.display = 'block';

  canvas = document.getElementById('gameCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx = canvas.getContext('2d');

  initGame();
  gameRunning = true;
  requestAnimationFrame(gameLoop);
}

function initGame() {
  player.x = mapW / 2;
  player.y = mapH / 2;
  player.angle = 0;
  player.hp = 100;

  currentWeapon = 'pistol';
  lastShot = 0;
  totalKills = 0;
  wave = 1;
  waveZombieCount = 1;
  zombies = [];
  bullets = [];
  bulletHoles = [];
  waveCleared = false;
  waveTimerActive = false;
  damageFlash = 0;
  shootFlash = 0;
  gameOver = false;
  victory = false;

  initMap();
  spawnZombies(waveZombieCount);
  updateHUD();
}

function spawnZombies(count) {
  for (var i = 0; i < count; i++) {
    var spawnX, spawnY;
    var attempts = 0;
    do {
      spawnX = 1.5 + Math.random() * (mapW - 3);
      spawnY = 1.5 + Math.random() * (mapH - 3);
      attempts++;
    } while ((isWall(spawnX, spawnY) || dist2D(spawnX, spawnY, player.x, player.y) < 5) && attempts < 50);

    zombies.push({
      id: zombieIdCounter++,
      x: spawnX, y: spawnY,
      hp: 100, maxHp: 100,
      speed: player.speed / 2,
      angle: 0,
      radius: 0.4,
      hitFlash: 0,
      lastDmgTime: 0
    });
  }
  waveCleared = false;
  waveTimerActive = false;
  document.getElementById('waveTimer').style.display = 'none';
  updateHUD();
}

function dist2D(x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx*dx + dy*dy);
}

var lastTime = 0;
function gameLoop(timestamp) {
  if (!gameRunning) return;
  var dt = (timestamp - lastTime) / 1000;
  if (dt > 0.1) dt = 0.1;
  lastTime = timestamp;

  update(dt, timestamp);
  render(timestamp);

  requestAnimationFrame(gameLoop);
}

function update(dt, now) {
  if (gameOver || victory) return;

  // Move player
  var speed = player.speed * dt;
  var dx = 0, dy = 0;
  if (keys.up)    { dx += Math.cos(player.angle) * speed; dy += Math.sin(player.angle) * speed; }
  if (keys.down)  { dx -= Math.cos(player.angle) * speed; dy -= Math.sin(player.angle) * speed; }
  if (keys.left)  { player.angle -= 1.5 * dt; }
  if (keys.right) { player.angle += 1.5 * dt; }

  var nx = player.x + dx;
  var ny = player.y + dy;
  if (!isWall(nx, player.y)) player.x = nx;
  if (!isWall(player.x, ny)) player.y = ny;

  // Clamp
  player.x = Math.max(0.6, Math.min(mapW - 0.6, player.x));
  player.y = Math.max(0.6, Math.min(mapH - 0.6, player.y));

  // Update zombies
  for (var i = zombies.length - 1; i >= 0; i--) {
    var z = zombies[i];
    var zdx = player.x - z.x;
    var zdy = player.y - z.y;
    var zdist = Math.sqrt(zdx*zdx + zdy*zdy);
    z.angle = Math.atan2(zdy, zdx);

    if (zdist > 0.5) {
      var zspeed = z.speed * dt;
      var znx = z.x + (zdx/zdist) * zspeed;
      var zny = z.y + (zdy/zdist) * zspeed;
      if (!isWall(znx, z.y)) z.x = znx;
      if (!isWall(z.x, zny)) z.y = zny;
    }

    // Damage player
    if (zdist < 0.8) {
      if (now - z.lastDmgTime > 1000) {
        z.lastDmgTime = now;
        player.hp -= 10;
        damageFlash = 0.5;
        if (player.hp <= 0) {
          player.hp = 0;
          triggerGameOver();
          return;
        }
      }
    }
    if (z.hitFlash > 0) z.hitFlash -= dt * 3;
  }

  // Bullets
  for (var b = bullets.length - 1; b >= 0; b--) {
    var bull = bullets[b];
    bull.x += Math.cos(bull.angle) * bull.speed * dt;
    bull.y += Math.sin(bull.angle) * bull.speed * dt;
    bull.life -= dt;

    if (bull.life <= 0 || isWall(bull.x, bull.y)) {
      bullets.splice(b, 1);
      continue;
    }

    // Hit zombie
    var hit = false;
    for (var zi = zombies.length - 1; zi >= 0; zi--) {
      var zz = zombies[zi];
      if (dist2D(bull.x, bull.y, zz.x, zz.y) < 0.5) {
        zz.hp -= bull.damage;
        zz.hitFlash = 1;
        bullets.splice(b, 1);
        if (zz.hp <= 0) {
          zombies.splice(zi, 1);
          totalKills++;
          checkWeaponUpgrade(totalKills);
          if (totalKills >= 200) {
            triggerVictory();
            return;
          }
        }
        hit = true;
        break;
      }
    }
  }

  // Wave timer
  if (zombies.length === 0 && !waveCleared && !waveTimerActive && !victory) {
    waveCleared = true;
    waveTimerActive = true;
    waveTimerEnd = Date.now() + 5000;
  }
  if (waveTimerActive) {
    var remaining = Math.ceil((waveTimerEnd - Date.now()) / 1000);
    if (remaining <= 0) {
      waveTimerActive = false;
      waveCleared = false;
      wave++;
      waveZombieCount++;
      document.getElementById('waveTimer').style.display = 'none';
      spawnZombies(waveZombieCount);
    } else {
      document.getElementById('waveTimer').style.display = 'block';
      document.getElementById('waveTimer').innerHTML = '🌊 웨이브 ' + (wave+1) + ' 시작까지<br><b>' + remaining + '초</b>';
    }
  }

  // Flash timers
  if (damageFlash > 0) damageFlash -= dt * 2;
  if (shootFlash > 0) shootFlash -= dt * 10;

  // Auto shoot
  if (shootHeld && currentWeapon !== 'pistol') {
    var wp = weapons[currentWeapon];
    var holdDuration = Date.now() - shootHeldStart;
    if (holdDuration >= wp.holdTime) {
      if (now*1000 - lastShot >= wp.burstCooldown * 1000) {
        // handled by interval
      }
    }
  }

  updateHUD();
}

function checkWeaponUpgrade(kills) {
  if (kills === 10 && currentWeapon === 'pistol') {
    currentWeapon = 'rifle';
    showWeaponNotif('💥 돌격소총 획득!', '10마리 처치 달성!');
  } else if (kills === 50 && currentWeapon !== 'minigun') {
    currentWeapon = 'minigun';
    showWeaponNotif('⚡ 미니건 획득!', '50마리 처치 달성!');
  }
}

function showWeaponNotif(title, sub) {
  var el = document.getElementById('weaponUpgradeNotif');
  el.innerHTML = title + '<br><span style="font-size:16px;color:#00ff88;">' + sub + '</span>';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 2500);
}

function updateHUD() {
  var pct = (player.hp / player.maxHp * 100);
  document.getElementById('playerHpBar').style.width = pct + '%';
  document.getElementById('playerHpText').textContent = player.hp + ' / ' + player.maxHp;
  document.getElementById('waveInfo').textContent = '🌊 웨이브 ' + wave;
  document.getElementById('killCount').textContent = '처치: ' + totalKills + ' / 200';
  document.getElementById('weaponInfo').textContent = weapons[currentWeapon].name;
  document.getElementById('zombieCount').textContent = zombies.length;
}

// ===================== SHOOTING =====================
function shootStart() {
  if (gameOver || victory) return;
  shootHeld = true;
  shootHeldStart = Date.now();
  doShoot();

  var wp = weapons[currentWeapon];
  if (currentWeapon === 'pistol') return;

  // For auto weapons
  shootInterval = setInterval(function() {
    if (!shootHeld) { clearInterval(shootInterval); return; }
    var holdDur = Date.now() - shootHeldStart;
    if (holdDur >= wp.holdTime) {
      doShoot();
    }
  }, wp.burstDelay);
}

function shootEnd() {
  shootHeld = false;
  if (shootInterval) { clearInterval(shootInterval); shootInterval = null; }
}

function doShoot() {
  if (gameOver || victory) return;
  var now = Date.now();
  var wp = weapons[currentWeapon];
  if (now - lastShot < wp.cooldown) return;
  lastShot = now;
  shootFlash = 1;

  bullets.push({
    x: player.x + Math.cos(player.angle) * 0.3,
    y: player.y + Math.sin(player.angle) * 0.3,
    angle: player.angle + (Math.random()-0.5)*0.05,
    speed: 15,
    damage: wp.damage,
    life: 2
  });
}

// ===================== RAYCASTING RENDER =====================
function render(now) {
  if (!ctx) return;
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  var skyGrad = ctx.createLinearGradient(0, 0, 0, H/2);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#b0e0ff');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H/2);

  // Floor
  var floorGrad = ctx.createLinearGradient(0, H/2, 0, H);
  floorGrad.addColorStop(0, '#7a7a6a');
  floorGrad.addColorStop(1, '#5a5a4a');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H/2, W, H/2);

  // Raycasting
  var zBuffer = [];
  for (var r = 0; r < rayCount; r++) {
