<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김원진의 반짝 보석 게임 💎</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cute+Font&family=Jua&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jua', sans-serif;
    background: linear-gradient(135deg, #1a0030 0%, #3d0060 30%, #6a0080 60%, #1a0030 100%);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* 배경 반짝임 */
  .bg-sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    animation: sparkleFloat linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  /* 시작 화면 */
  #startScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a0030 0%, #3d0060 30%, #6a0080 60%, #1a0030 100%);
  }

  .title-crown {
    font-size: 60px;
    animation: bounce 1s ease-in-out infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-15px); }
  }

  .game-title {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff9de2, #ffd700, #ff9de2, #b5e8ff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s linear infinite;
    text-align: center;
    margin: 10px 0;
    text-shadow: none;
    filter: drop-shadow(0 0 10px rgba(255,180,255,0.8));
  }

  .student-name {
    font-size: 24px;
    color: #ffd6f7;
    text-shadow: 0 0 10px #ff88cc;
    margin-bottom: 20px;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .gem-preview {
    display: flex;
    gap: 15px;
    margin: 20px 0;
    animation: float 2s ease-in-out infinite alternate;
  }

  @keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  .preview-gem {
    font-size: 40px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
    animation: gemSpin 3s linear infinite;
  }

  .preview-gem:nth-child(2) { animation-delay: 0.5s; }
  .preview-gem:nth-child(3) { animation-delay: 1s; }
  .preview-gem:nth-child(4) { animation-delay: 1.5s; }

  @keyframes gemSpin {
    0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 8px rgba(255,200,255,0.9)); }
    50% { transform: scale(1.2) rotate(10deg); filter: drop-shadow(0 0 15px rgba(255,255,100,0.9)); }
  }

  .start-btn {
    margin-top: 25px;
    padding: 18px 60px;
    font-size: 28px;
    font-family: 'Jua', sans-serif;
    background: linear-gradient(135deg, #ff6eb4, #ff3d9a, #d400ff);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,100,200,0.8), 0 0 60px rgba(200,0,255,0.4);
    transition: all 0.2s;
    animation: btnPulse 1.5s ease-in-out infinite alternate;
    letter-spacing: 2px;
  }

  .start-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(255,100,200,1), 0 0 80px rgba(200,0,255,0.6);
  }

  @keyframes btnPulse {
    from { box-shadow: 0 0 20px rgba(255,100,200,0.6), 0 0 40px rgba(200,0,255,0.3); }
    to { box-shadow: 0 0 40px rgba(255,100,200,1), 0 0 80px rgba(200,0,255,0.7); }
  }

  /* 게임 화면 */
  #gameScreen {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
    position: relative;
    z-index: 1;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 600px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,180,255,0.4);
    border-radius: 20px;
    padding: 10px 20px;
    margin-bottom: 10px;
    color: white;
  }

  .info-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .info-label {
    font-size: 12px;
    color: #ffb6e6;
    letter-spacing: 1px;
  }

  .info-value {
    font-size: 22px;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
    font-weight: bold;
  }

  .stage-title {
    font-size: 16px;
    color: #ffd6f7;
    text-align: center;
  }

  .name-display {
    font-size: 13px;
    color: #ffb6e6;
    text-align: center;
    margin-bottom: 5px;
  }

  /* 진행 바 */
  .progress-bar-wrap {
    width: 100%;
    max-width: 600px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    height: 14px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,180,255,0.3);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6eb4, #ffd700, #ff6eb4);
    background-size: 200%;
    border-radius: 20px;
    transition: width 0.4s ease;
    animation: shimmer 1.5s linear infinite;
  }

  /* 게임 보드 */
  #boardContainer {
    position: relative;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,180,255,0.4);
    border-radius: 16px;
    padding: 4px;
    box-shadow: 0 0 30px rgba(255,100,200,0.3), inset 0 0 20px rgba(0,0,0,0.3);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 2px;
  }

  .cell {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.15s, background 0.15s;
    position: relative;
    background: rgba(255,255,255,0.04);
    user-select: none;
  }

  .cell:hover {
    background: rgba(255,200,255,0.15);
    transform: scale(1.1);
  }

  .cell.selected {
    background: rgba(255,215,0,0.35);
    border: 2px solid #ffd700;
    transform: scale(1.15);
    box-shadow: 0 0 12px rgba(255,215,0,0.8);
    animation: selectedPulse 0.5s ease-in-out infinite alternate;
  }

  @keyframes selectedPulse {
    from { box-shadow: 0 0 8px rgba(255,215,0,0.6); }
    to { box-shadow: 0 0 20px rgba(255,215,0,1); }
  }

  .cell.match {
    animation: matchExplode 0.5s ease forwards;
  }

  @keyframes matchExplode {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.4); opacity: 0.9; filter: brightness(2); }
    100% { transform: scale(0); opacity: 0; }
  }

  .cell.swap-anim {
    animation: swapBounce 0.25s ease;
  }

  @keyframes swapBounce {
    0% { transform: scale(1); }
    50% { transform: scale(0.8); }
    100% { transform: scale(1); }
  }

  .cell.drop-anim {
    animation: dropDown 0.3s ease;
  }

  @keyframes dropDown {
    0% { transform: translateY(-20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* 폭발 파티클 */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 16px;
    z-index: 999;
    animation: particleFly 0.8s ease forwards;
  }

  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* 점수 팝업 */
  .score-popup {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    font-family: 'Jua', sans-serif;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255,150,0,0.9);
    z-index: 999;
    animation: scoreFloat 1s ease forwards;
    font-weight: bold;
  }

  @keyframes scoreFloat {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
  }

  /* 스테이지 클리어 / 게임 클리어 */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  #overlay.show {
    display: flex;
  }

  .overlay-box {
    background: linear-gradient(135deg, #3d0060, #6a0080, #3d0060);
    border: 3px solid rgba(255,180,255,0.7);
    border-radius: 30px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,100,200,0.7);
    animation: overlayPop 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  @keyframes overlayPop {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .overlay-title {
    font-size: 40px;
    background: linear-gradient(90deg, #ffd700, #ff9de2, #ffd700);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 1.5s linear infinite;
    margin-bottom: 15px;
  }

  .overlay-info {
    font-size: 22px;
    color: #ffd6f7;
    margin-bottom: 25px;
    line-height: 1.6;
  }

  .overlay-btn {
    padding: 14px 50px;
    font-size: 22px;
    font-family: 'Jua', sans-serif;
    background: linear-gradient(135deg, #ff6eb4, #d400ff);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,100,200,0.7);
    transition: all 0.2s;
  }

  .overlay-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255,100,200,1);
  }

  /* 반짝 효과 */
  .gem-sparkle {
    position: absolute;
    top: -5px; right: -5px;
    font-size: 10px;
    animation: sparkleSmall 1.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes sparkleSmall {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
