<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블록 블라스트 - 장민서</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a5c1a, #2d8a2d, #1a5c1a);
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  h1 {
    color: #fff;
    font-size: 2rem;
    text-shadow: 2px 2px 6px #000;
    margin-top: 14px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: #aaffaa;
    font-size: 1rem;
    margin-bottom: 8px;
  }
  .top-bar {
    display: flex;
    gap: 30px;
    align-items: center;
    background: rgba(0,0,0,0.35);
    border-radius: 16px;
    padding: 8px 30px;
    margin-bottom: 10px;
  }
  .top-bar .info-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .top-bar .label {
    color: #aaffaa;
    font-size: 0.78rem;
    font-weight: bold;
  }
  .top-bar .value {
    color: #fff;
    font-size: 1.5rem;
    font-weight: bold;
    text-shadow: 0 0 8px #0f0;
  }
  .lives {
    display: flex;
    gap: 6px;
    font-size: 1.6rem;
  }
  .life { transition: opacity 0.3s; }
  .life.dead { opacity: 0.2; }
  .game-area {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  #board-wrap {
    position: relative;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(10, 46px);
    grid-template-rows: repeat(10, 46px);
    gap: 3px;
    background: rgba(0,0,0,0.4);
    padding: 8px;
    border-radius: 14px;
    border: 3px solid #4cff4c;
    box-shadow: 0 0 30px #2d8a2d, inset 0 0 20px rgba(0,255,0,0.07);
  }
  .cell {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 3px #000;
    position: relative;
    overflow: hidden;
  }
  .cell.highlight {
    border: 2.5px solid #fff;
    box-shadow: 0 0 10px #fff, 0 0 3px #fff inset;
    transform: scale(1.08);
    z-index: 2;
  }
  .cell.blast-anim {
    animation: blastCell 0.35s ease-out forwards;
  }
  @keyframes blastCell {
    0% { transform: scale(1.2); opacity: 1; }
    60% { transform: scale(1.5); opacity: 0.6; }
    100% { transform: scale(0); opacity: 0; }
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .panel-title {
    color: #aaffaa;
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .pieces-area {
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: rgba(0,0,0,0.35);
    border-radius: 14px;
    padding: 12px 10px;
    border: 2px solid #4cff4c;
    min-width: 140px;
    align-items: center;
  }
  .piece-slot {
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 6px;
    cursor: grab;
    border: 2px solid transparent;
    transition: border 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    min-width: 110px;
    min-height: 50px;
    justify-content: center;
  }
  .piece-slot.selected {
    border: 2.5px solid #fff200;
    box-shadow: 0 0 14px #fff200;
  }
  .piece-slot.used { opacity: 0.2; pointer-events: none; }
  .piece-grid {
    display: grid;
    gap: 3px;
  }
  .piece-cell {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1.5px solid rgba(255,255,255,0.25);
  }
  .piece-cell.empty { background: transparent; border-color: transparent; }
  .piece-score {
    color: #fff200;
    font-size: 0.75rem;
    font-weight: bold;
    margin-top: 3px;
  }
  #msg-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #msg-overlay.show { display: flex; }
  .msg-box {
    background: linear-gradient(135deg, #1a7a1a, #2ecc2e);
    border: 4px solid #aaff00;
    border-radius: 24px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 40px #0f0;
    animation: popIn 0.4s cubic-bezier(.17,.67,.44,1.3);
  }
  @keyframes popIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .msg-box h2 { color: #fff200; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 8px #000; }
  .msg-box p { color: #fff; font-size: 1.2rem; margin-bottom: 20px; }
  .msg-box button {
    background: #fff200;
    color: #1a5c1a;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    padding: 12px 36px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .msg-box button:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
  .score-popup {
    position: fixed;
    font-size: 1.6rem;
    font-weight: bold;
    color: #fff200;
    text-shadow: 1px 1px 4px #000;
    pointer-events: none;
    z-index: 200;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1.2); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
  }
  .row-col-flash {
    animation: flashLine 0.5s ease-out forwards;
  }
  @keyframes flashLine {
    0% { background: #fff200 !important; transform: scale(1.08); }
    50% { background: #aaff00 !important; }
    100% { opacity: 0; transform: scale(0); }
  }
  #how-to {
    color: #aaffaa;
    font-size: 0.78rem;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 7px 14px;
    margin-top: 4px;
    max-width: 500px;
    text-align: center;
    line-height: 1.6;
  }
  .combo-text {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.8rem;
    font-weight: bold;
    color: #ff4;
    text-shadow: 0 0 20px #f80, 2px 2px 8px #000;
    pointer-events: none;
    z-index: 300;
    animation: comboAnim 1s ease-out forwards;
  }
  @keyframes comboAnim {
    0% { opacity: 1; transform: translateX(-50%) scale(1.5); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-40px); }
  }
</style>
</head>
<body>

<h1>🟩 블록 블라스트</h1>
<div class="subtitle">👤 장민서</div>

<div class="top-bar">
  <div class="info-box">
    <span class="label">점수</span>
    <span class="value" id="scoreVal">0</span>
  </div>
  <div class="info-box">
    <span class="label">최고점수</span>
    <span class="value" id="bestVal">0</span>
  </div>
  <div class="info-box">
    <span class="label">목숨</span>
    <div class="lives" id="livesDisplay">
      <span class="life" id="l1">❤️</span>
      <span class="life" id="l2">❤️</span>
      <span class="life" id="l3">❤️</span>
    </div>
  </div>
  <div class="info-box">
    <span class="label">레벨</span>
    <span class="value" id="levelVal">1</span>
  </div>
</div>

<div id="how-to">
  💡 오른쪽에서 블록 조각을 선택 → 보드에서 놓을 위치를 클릭!<br>
  줄이나 열이 꽉 차면 폭발! 1~7점 랜덤 점수 획득 🎉
</div>

<div class="game-area" style="margin-top:12px;">
  <div id="board-wrap">
    <div id="board"></div>
  </div>
  <div class="panel">
    <div class="panel-title">📦 블록 조각 (3개)</div>
    <div class="pieces-area" id="piecesArea"></div>
    <button onclick="requestNewPieces()" id="refreshBtn" style="
      background:#4cff4c; color:#1a3d00; font-size:1rem; font-weight:bold;
      border:none; border-radius:10px; padding:10px 22px; cursor:pointer;
      box-shadow:0 3px 10px rgba(0,0,0,0.3); margin-top:4px;
      transition: transform 0.1s;">
      🔄 새 조각 받기
    </button>
    <div style="color:#ffcc44; font-size:0.78rem; text-align:center;">
      ※ 새 조각 받기: 목숨 1개 소모
    </div>
  </div>
</div>

<div id="msg-overlay">
  <div class="msg-box">
    <h2 id="msgTitle">게임 오버!</h2>
    <p id="msgBody">최종 점수: 0</p>
    <button onclick="restartGame()">🔄 다시 시작!</button>
  </div>
</div>

<script>
const ROWS = 10, COLS = 10;
let board = [];
let score = 0, best = 0, lives = 3, level = 1;
let pieces = [null, null, null];
let selectedPiece = -1;
let gameOver = false;

// 블록 조각 정의 (shape: 2D array, color)
const PIECE_TEMPLATES = [
  // 1x1
  { shape: [[1]], color: '#e74c3c' },
  // 1x2
  { shape: [[1,1]], color: '#e67e22' },
  // 2x1
  { shape: [[1],[1]], color: '#f1c40f' },
  // 1x3
  { shape: [[1,1,1]], color: '#2ecc71' },
  // 3x1
  { shape: [[1],[1],[1]], color: '#1abc9c' },
  // 2x2
  { shape: [[1,1],[1,1]], color: '#3498db' },
  // L자
  { shape: [[1,0],[1,0],[1,1]], color: '#9b59b6' },
  // J자
  { shape: [[0,1],[0,1],[1,1]], color: '#e91e63' },
  // S자
  { shape: [[0,1,1],[1,1,0]], color: '#00bcd4' },
  // Z자
  { shape: [[1,1,0],[0,1,1]], color: '#ff5722' },
  // T자
  { shape: [[1,1,1],[0,1,0]], color: '#8bc34a' },
  // 1x4
  { shape: [[1,1,1,1]], color: '#ff9800' },
  // 4x1
  { shape: [[1],[1],[1],[1]], color: '#03a9f4' },
  // L 반전
  { shape: [[1,1],[1,0],[1,0]], color: '#cddc39' },
  // 2x3
  { shape: [[1,1],[1,1],[1,1]], color: '#ff4081' },
];

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function randPieceScore() { return randInt(1, 7); }

function randPiece() {
  const t = PIECE_TEMPLATES[randInt(0, PIECE_TEMPLATES.length - 1)];
  return {
    shape: t.shape,
    color: t.color,
    pts: randPieceScore()
  };
}

function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board.push([]);
    for (let c = 0; c < COLS; c++) {
      board[r].push(null);
    }
  }
}

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      if (board[r][c]) {
        cell.style.background = board[r][c];
        cell.style.boxShadow = `0 0 8px ${board[r][c]}88`;
      }
      cell.addEventListener('click', () => onCellClick(r, c));
      cell.addEventListener('mouseover', () => onCellHover(r, c));
      cell.addEventListener('mouseout', clearHighlight);
      el.appendChild(cell);
    }
  }
}

function renderPieces() {
  const area = document.getElementById('piecesArea');
  area.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div');
    slot.className = 'piece-slot' + (i === selectedPiece ? ' selected' : '') + (!pieces[i] ? ' used' : '');
    slot.id = `piece-slot-${i}`;
    if (pieces[i]) {
      const pg = document.createElement('div');
      pg.className = 'piece-grid';
      const sh = pieces[i].shape;
      const cols = sh[0].length;
      pg.style.gridTemplateColumns = `repeat(${cols}, 26px)`;
      for (let r = 0; r < sh.length; r++) {
        for (let c = 0; c < cols; c++) {
          const pc = document.createElement('div');
          pc.className = 'piece-cell' + (sh[r][c] ? '' : ' empty');
          if (sh[r][c]) {
            pc.style.background = pieces[i].color;
            pc.style.boxShadow = `0 0 6px ${pieces[i].color}88`;
          }
          pg.appendChild(pc);
        }
      }
      slot.appendChild(pg);
      const sc = document.createElement('div');
      sc.className = 'piece-score';
      sc.textContent = `⭐ ${pieces[i].pts}점`;
      slot.appendChild(sc);
      slot.addEventListener('click', () => selectPiece(i));
    }
    area.appendChild(slot);
  }
}

function selectPiece(i) {
  if (!pieces[i]) return;
  selectedPiece = (selectedPiece === i) ? -1 : i;
  clearHighlight();
  renderPieces();
}

function canPlace(piece, startR, startC) {
  const sh = piece.shape;
  for (let r = 0; r < sh.length; r++) {
    for (let c = 0; c < sh[0].length; c++) {
      if (sh[r][c]) {
        const nr = startR + r, nc = startC + c;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
        if (board[nr][nc]) return false;
      }
    }
  }
  return true;
}

function onCellHover(r, c) {
  clearHighlight();
  if (selectedPiece < 0 || !pieces[selectedPiece]) return;
  const piece = pieces[selectedPiece];
  const sh = piece.shape;
  for (let pr = 0; pr < sh.length; pr++) {
    for (let pc2 = 0; pc2 < sh[0].length; pc2++) {
      if (sh[pr][pc2]) {
        const nr = r + pr, nc = c + pc2;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
          const el = document.getElementById(`cell-${nr}-${nc}`);
          if (el) {
            el.classList.add('highlight');
            if (!board[nr][nc]) {
              el.style.background = piece.color + '88';
            }
          }
        }
      }
    }
  }
}

function clearHighlight() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.getElementById(`cell-${r}-${c}`);
      if (el) {
        el.classList.remove('highlight');
        el.style.background = board[r][c] ? board[r][c] : '';
      }
    }
  }
}

function onCellClick(r, c) {
  if (gameOver) return;
  if (selectedPiece < 0 || !pieces[selectedPiece]) return;
  const piece = pieces[selectedPiece];
  if (!canPlace(piece, r, c)) return;
  placePiece(piece, r, c);
}

function placePiece(piece, startR, startC) {
  const sh = piece.shape;
  for (let r = 0; r < sh.length; r++) {
    for (let c = 0; c < sh[0].length; c++) {
      if (sh[r][c]) {
        board[startR + r][startC + c] = piece.color;
      }
    }
  }
  const earned = piece.pts;
  pieces[selectedPiece] = null;
  selectedPiece = -1;
  renderBoard();
  renderPieces();

  // Check lines
  setTimeout(() => {
    const linesCleared = clearLines(earned);
    setTimeout(() => {
      addScore(earned, linesCleared, startR, startC);
      checkAllUsed();
      checkGameOver();
    }, linesCleared > 0 ? 420 : 10);
  }, 60);
}

function clearLines(basePts) {
  let fullRows = [], fullCols = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(v => v !== null)) fullRows.push(r);
  }
  for (let c = 0; c < COLS; c++) {
    let full = true;
    for (let r = 0; r < ROWS; r++) {
      if (!board[r][c]) { full = false; break; }
    }
    if (full) fullCols.push(c);
  }
  const totalLines = fullRows.length + fullCols.length;
  if (totalLines === 0) return 0;

  // Animate blast
  let blastCells = new Set();
  fullRows.forEach(r => {
    for (let c = 0; c < COLS; c++) blastCells.add(`${r}-${c}`);
  });
  fullCols.forEach(c => {
    for (let r = 0; r < ROWS; r++) blastCells.add(`${r}-${c}`);
  });
  blastCells.forEach(key => {
    const el = document.getElementById(`cell-${key}`);
    if (el) el.classList.add('row-col-flash');
  });

  setTimeout(() => {
    fullRows.forEach(r => {
      for (let c = 0; c < COLS; c++) board[r][c] = null;
    });
    fullCols.forEach(c => {
      for (let r = 0; r < ROWS; r++) board[r][c] = null;
    });
    renderBoard();
  }, 350);

  return totalLines;
}

function addScore(basePts, lines, r, c) {
  let gained = basePts;
  if (lines > 0) {
    gained += lines * randInt(3, 7);
    if (lines >= 2) showCombo(lines);
  }
  score += gained;
  if (score > best) best = score;
  level = Math.floor(score / 50) + 1;
  updateUI();
  showScorePopup(gained, r, c);
}

function showScorePopup(pts, r, c) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = `+${pts}`;
  const boardEl = document.getElementById('board');
  const rect = boardEl.getBoundingClientRect();
  el.style.left = (rect.left + c * 49 + 20) + 'px';
  el.style.top = (rect.top + r * 49 - 10 + window.scrollY) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function showCombo(n) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = n >= 3 ? `🔥 MEGA BLAST x${n}!` : `💥 COMBO x${n}!`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = best;
  document.getElementById('levelVal').textContent = level;
  const lifeEls = [document.getElementById('l1'), document.getElementById('l2'), document.getElementById('l3')];
  lifeEls.forEach((el, i) => {
    el.classList.toggle('dead', i >= lives);
  });
}

function checkAllUsed() {
  if (pieces.every(p => p === null)) {
    pieces = [randPiece(), randPiece(), randPiece()];
    renderPieces();
  }
}

function checkGameOver() {
  // Check if any piece can be placed anywhere
  const available = pieces.filter(p => p !== null);
  for (const piece of available) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (canPlace(piece, r, c)) return;
      }
    }
  }
  // No move possible - lose a life
  lives--;
  updateUI();
  if (lives <= 0) {
    gameOver = true;
    setTimeout(showGameOver, 400);
  } else {
    showNoMoveWarning();
    // Reset board partially (clear some random cells to give chance)
    clearSomeBoard();
    renderBoard();
  }
}

function clearSomeBoard() {
  // Clear 20% of filled cells randomly to give player another chance
  let filled = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) filled.push([r, c]);
  const toClear = Math.ceil(filled.length * 0.3);
  for (let i = 0; i < toClear; i++) {
    const idx = randInt(0, filled.length - 1);
    const [r, c] = filled.splice(idx, 1)[0];
    board[r][c] = null;
  }
  pieces = [randPiece(), randPiece(), randPiece()];
  renderPieces();
}

function showNoMoveWarning() {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(255,0,0,0.85);color:#fff;font-size:1.5rem;font-weight:bold;
    border-radius:16px;padding:20px 40px;z-index:500;text-align:center;
    box-shadow:0 0 30px red;animation:popIn 0.4s ease;`;
  el.innerHTML = `💔 막혔어요!<br>목숨 1개 감소!<br>보드 일부를 초기화합니다.`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

function showGameOver() {
  document.getElementById('msgTitle').textContent = '💀 게임 오버!';
  document.getElementById('msgBody').innerHTML = `최종 점수: <b>${score}</b><br>최고 기록: <b>${best}</b><br>레벨: <b>${level}</b>`;
  document.getElementById('msg-overlay').classList.add('show');
}

function requestNewPieces() {
  if (gameOver) return;
  if (lives <= 1) {
    alert('목숨이 1개 남아서 새 조각을 받을 수 없어요!');
    return;
  }
  lives--;
  pieces = [randPiece(), randPiece(), randPiece()];
  selectedPiece = -1;
  updateUI();
  renderPieces();
}

function restartGame() {
  score = 0; lives = 3; level = 1; gameOver = false; selectedPiece = -1;
  initBoard();
  pieces = [randPiece(), randPiece(), randPiece()];
  renderBoard();
  renderPieces();
  updateUI();
  document.getElementById('msg-overlay').classList.remove('show');
}

initBoard();
pieces = [randPiece(), randPiece(), randPiece()];

renderPieces();
updateUI();
</script>
