<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅇㅇㅇ의 구구단 퀴즈 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .student-name {
            text-align: center;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 20px;
            display: inline-block;
            width: 100%;
        }

        /* 시작 화면 */
        #startScreen {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #startScreen .title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        #startScreen .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }

        .emoji-big {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .level-select {
            margin: 20px 0;
        }

        .level-select h3 {
            font-size: 18px;
            color: #555;
            margin-bottom: 15px;
        }

        .level-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 10px 20px;
            border: 3px solid #ddd;
            border-radius: 15px;
            background: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Nanum Gothic', sans-serif;
            color: #555;
        }

        .level-btn:hover {
            transform: scale(1.05);
        }

        .level-btn.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .start-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.5);
            transition: all 0.2s;
            font-family: 'Nanum Gothic', sans-serif;
            width: 100%;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(245, 87, 108, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* 게임 화면 */
        #gameScreen {
            display: none;
            background: white;
            border-radius: 30px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-box, .time-box, .life-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 15px;
        }

        .time-box {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            font-size: 18px;
        }

        .life-box {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            letter-spacing: 3px;
        }

        .progress-bar-wrap {
            background: #eee;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .question-num {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .question-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            padding: 30px 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .question-box::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .question-text {
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-shadow: 0 3px 6px rgba(0,0,0,0.2);
            animation: fadeSlideIn 0.3s ease;
        }

        @keyframes fadeSlideIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .question-hint {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-top: 8px;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .answer-btn {
            padding: 20px 10px;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            font-size: 26px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Nanum Gothic', sans-serif;
            color: #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .answer-btn:hover {
            transform: scale(1.05);
            border-color: #667eea;
            background: #f0f0ff;
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            border-color: #56ab2f;
            color: white;
            animation: correctPop 0.4s ease;
        }

        .answer-btn.wrong {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            border-color: #f5576c;
            color: white;
            animation: shake 0.4s ease;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .answer-input {
            flex: 1;
            padding: 15px;
            font-size: 28px;
            font-weight: 800;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            font-family: 'Nanum Gothic', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .answer-input:focus {
            border-color: #667eea;
        }

        .submit-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            font-family: 'Nanum Gothic', sans-serif;
            font-weight: 800;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }

        .feedback {
            font-size: 24px;
            font-weight: 800;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback.correct-msg { color: #56ab2f; }
        .feedback.wrong-msg { color: #f5576c; }

        /* 결과 화면 */
        #resultScreen {
            display: none;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: popIn 0.5s ease;
        }

        .result-emoji {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-score {
            font-size: 60px;
            font-weight: 800;
            color: #f5576c;
            margin: 10px 0;
        }

        .result-stats {
            background: #f8f8ff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 16px;
            border-bottom: 1px solid #eee;
        }

        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #888; }
        .stat-value { font-weight: 800; color: #444; }

        .grade-badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: 800;
            margin: 10px 0 20px;
        }

        .grade-S { background: linear-gradient(135deg, #f7971e, #ffd200); color: white; }
        .grade-A { background: linear-gradient(135deg, #56ab2f, #a8e063); color: white; }
        .grade-B { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .grade-C { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

        .retry-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
            font-family: 'Nanum Gothic', sans-serif;
            width: 100%;
        }

        .retry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.5);
        }

        .home-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
            font-family: 'Nanum Gothic', sans-serif;
            width: 100%;
        }

        .home-btn:hover {
            transform: translateY(-3px);
        }

        /* 파티클 효과 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 1s ease forwards;
            z-index: 999;
        }

        @keyframes particleFly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .combo-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 998;
            animation: comboPop 0.8s ease forwards;
            pointer-events: none;
        }

        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -60%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="container">
    <div class="student-name">⭐ ㅇㅇㅇ의 구구단 퀴즈 게임 ⭐</div>

    <!-- 시작 화면 -->
    <div id="startScreen">
        <div class="emoji-big">🔢</div>
        <div class="title">구구단 퀴즈!</div>
        <div class="subtitle">구구단을 얼마나 잘 알고 있나요?</div>

        <div class="level-select">
            <h3>📚 난이도를 선택하세요</h3>
            <div class="level-buttons">
                <button class="level-btn selected" onclick="selectLevel('easy')" id="btn-easy">🌱 쉬움<br><small>2~5단</small></button>
                <button class="level-btn" onclick="selectLevel('normal')" id="btn-normal">🌿 보통<br><small>2~9단</small></button>
                <button class="level-btn" onclick="selectLevel('hard')" id="btn-hard">🔥 어려움<br><small>객관식→주관식</small></button>
            </div>
        </div>

        <div class="level-select">
            <h3>🎯 문제 수를 선택하세요</h3>
            <div class="level-buttons">
                <button class="level-btn" onclick="selectCount(10)" id="btn-10">10문제</button>
                <button class="level-btn selected" onclick="selectCount(20)" id="btn-20">20문제</button>
                <button class="level-btn" onclick="selectCount(30)" id="btn-30">30문제</button>
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">🚀 게임 시작!</button>
    </div>

    <!-- 게임 화면 -->
    <div id="gameScreen">
        <div class="game-header">
            <div class="score-box">🏆 <span id="scoreDisplay">0</span></div>
            <div class="time-box">⏱ <span id="timerDisplay">15</span></div>
            <div class="life-box" id="lifeDisplay">❤️❤️❤️</div>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="question-num" id="questionNum">문제 1 / 20</div>
        <div class="question-box">
            <div class="question-text" id="questionText">3 × 4 = ?</div>
            <div class="question-hint" id="questionHint">3단</div>
        </div>

        <!-- 객관식 -->
        <div class="answer-grid" id="multipleChoice">
            <button class="answer-btn" id="opt0" onclick="selectAnswer(0)"></button>
            <button class="answer-btn" id="opt1" onclick="selectAnswer(1)"></button>
            <button class="answer-btn" id="opt2" onclick="selectAnswer(2)"></button>
            <button class="answer-btn" id="opt3" onclick="selectAnswer(3)"></button>
        </div>

        <!-- 주관식 -->
        <div class="input-section" id="inputSection" style="display:none;">
            <input type="number" class="answer-input" id="answerInput" placeholder="?" min="1" max="81">
            <button class="submit-btn" onclick="submitInputAnswer()">확인</button>
        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <!-- 결과 화면 -->
    <div id="resultScreen">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-title" id="resultTitle">훌륭해요!</div>
        <div id="gradeBadge" class="grade-badge grade-S">S등급</div>
        <div class="result-score" id="resultScore">100점</div>
        <div class="result-stats">
            <div class="stat-row">
                <span class="stat-label">✅ 맞힌 문제</span>
                <span class="stat-value" id="statCorrect">0개</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">❌ 틀린 문제</span>
                <span class="stat-value" id="statWrong">0개</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🔥 최고 콤보</span>
                <span class="stat-value" id="statCombo">0연속</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">⏱ 평균 시간</span>
                <span class="stat-value" id="statTime">0초</span>
            </div>
        </div>
        <button class="retry-btn" onclick="retryGame()">🔄 다시 도전!</button>
        <button class="home-btn" onclick="goHome()">🏠 처음으로</button>
    </div>
</div>

<script>
    // 별 생성
    (function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 4 + 1;
            star.style.cssText = `
                width: ${size}px; height: ${size}px;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                animation-delay: ${Math.random() * 2}s;
                animation-duration: ${1.5 + Math.random() * 2}s;
            `;
            container.appendChild(star);
        }
    })();

    // 게임 상태
    let selectedLevel = 'easy';
    let selectedCount = 20;
    let currentQuestion = 0;
    let score = 0;
    let lives = 3;
    let correctCount = 0;
    let wrongCount = 0;
    let combo = 0;
    let maxCombo = 0;
    let timerInterval = null;
    let timeLeft = 15;
    let totalTimeUsed = 0;
    let questions = [];
    let correctAnswer = 0;
    let answered = false;
    let questionStartTime = 0;
    let isInputMode = false;

    function selectLevel(level) {
        selectedLevel = level;
        document.querySelectorAll('#startScreen .level-buttons').forEach((group, idx) => {
            if (idx === 0) {
                group.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('selected'));
                document.getElementById('btn-' + level).classList.add('selected');
            }
        });
    }

    function selectCount(count) {
        selectedCount = count;
        [10, 20, 30].forEach(c => {
            document.getElementById('btn-' + c).classList.remove('selected');
        });
        document.getElementById('btn-' + count).classList.add('selected');
    }

    function generateQuestions() {
        questions = [];
        const easyDan = [2, 3, 4, 5];
        const allDan = [2, 3, 4, 5, 6, 7, 8, 9];
        const pool = selectedLevel === 'easy' ? easyDan : allDan;

        for (let i = 0; i < selectedCount; i++) {
            const dan = pool[Math.floor(Math.random() * pool.length)];
            const num = Math.floor(Math.random() * 9) + 1;
            questions.push({ dan, num, answer: dan * num });
        }
    }

    function startGame() {
        generateQuestions();
        currentQuestion = 0;
        score = 0;
        lives = 3;
        correctCount = 0;
        wrongCount = 0;
        combo = 0;
        maxCombo = 0;
        totalTimeUsed = 0;

        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';

        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestion >= questions.length || lives <= 0) {
            endGame();
            return;
        }

        answered = false;
        const q = questions[currentQuestion];
        correctAnswer = q.answer;
        questionStartTime = Date.now();

        // 문제 텍스트
        document.getElementById('questionText').textContent = `${q.dan} × ${q.num} = ?`;
        document.getElementById('questionHint').textContent = `${q.dan}단 (${q.dan} × ${q.num})`;
        document.getElementById('questionNum').textContent = `문제 ${currentQuestion + 1} / ${questions.length}`;
        document.getElementById('feedback').textContent = '';
        document.getElementById('feedback').className = 'feedback';

        // 진행바
        const pct = (currentQuestion / questions.length) * 100;
        document.getElementById('progressBar').style.width = pct + '%';

        // 점수 갱신
        document.getElementById('scoreDisplay').textContent = score;
        updateLives();

        // 주관식 or 객관식
        isInputMode = (selectedLevel === 'hard' && currentQuestion >= Math.floor(questions.length / 2));

        if (isInputMode) {
            document.getElementById('multipleChoice').style.display = 'none';
            document.getElementById('inputSection').style.display = 'flex';
            const inp = document.getElementById('answerInput');
            inp.value = '';
            inp.disabled = false;
            inp.focus();
        } else {
            document.getElementById('multipleChoice').style.display = 'grid';
            document.getElementById('inputSection').style.display = 'none';
            generateOptions(q);
        }

        // 타이머
        clearInterval(timerInterval);
        timeLeft = selectedLevel === 'easy' ? 20 : selectedLevel === 'normal' ? 15 : 10;
        document.getElementById('timerDisplay').textContent = timeLeft;
        timerInterval = setInterval(tickTimer, 1000);
    }

    function generateOptions(q) {
        const correct = q.answer;
        const options = new Set([correct]);

        while (options.size < 4) {
            let fake = correct + (Math.floor(Math.random() * 11) - 5);
            if (fake > 0 && fake !== correct) options.add(fake);
        }

        const arr = Array.from(options).sort(() => Math.random() - 0.5);

        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById('opt' + i);
            btn.textContent = arr[i];
            btn.dataset.value = arr[i];
            btn.className = 'answer-btn';
            btn.disabled = false;
        }
    }

    function tickTimer() {
        timeLeft--;
        document.getElementById('timerDisplay').textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (!answered) {
                timeOut();
            }
        }
    }

    function timeOut() {
        answered = true;
        combo = 0;
        lives--;
        updateLives();

        document.getElementById('feedback').textContent = `⏰ 시간 초과! 정답: ${correctAnswer}`;
        document.getElementById('feedback').className = 'feedback wrong-msg';
        wrongCount++;

        if (lives <= 0) {
            setTimeout(endGame, 1200);
        } else {
            setTimeout(() => {
                currentQuestion++;
                loadQuestion();
            }, 1200);
        }
    }

    function selectAnswer(idx) {
        if (answered) return;
        answered = true;
        clearInterval(timerInterval);

        const btn = document.getElementById('opt' + idx);

        } else {
            btn.classList.add('wrong');

                if (parseInt(b.dataset.value) === correctAnswer) {
                    b.classList.add('correct');
                }
            }
            handleWrong();
        }
    }
