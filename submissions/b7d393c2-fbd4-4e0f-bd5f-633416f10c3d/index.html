<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트학생의 앱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', sans-serif;
    }

    .student-name {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.6);
      padding: 8px 20px;
      border-radius: 20px;
    }

    .card {
      background: white;
      border-radius: 30px;
      padding: 60px 80px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      animation: popIn 0.6s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      80%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .hello-text {
      font-size: 5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #ff6b6b, #ffa500, #ffd700, #4ecdc4, #45b7d1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      animation: rainbow 3s linear infinite;
      background-size: 200%;
    }

    @keyframes rainbow {
      0%   { background-position: 0%; }
      100% { background-position: 200%; }
    }

    .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
      animation: wave 1.5s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-20deg); }
    }

    .btn {
      margin-top: 30px;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 2s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.4); }
    }

    .card {
      position: relative;
      z-index: 1;
    }

    .student-name {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="student-name">👤 테스트학생</div>

  <div class="card">
    <span class="emoji" id="emoji">👋</span>
    <div class="hello-text" id="helloText">안녕!</div>
    <p style="color:#888; font-size:1rem;">반가워요, 테스트학생! 😊</p>
    <button class="btn" onclick="changeGreeting()">다른 인사말 보기 🎲</button>
  </div>

  <script>
    // 반짝이는 별 만들기
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.left = Math.random() * 100 + '%';
      star.style.top  = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 2 + 's';
      star.style.width  = (Math.random() * 8 + 4) + 'px';
      star.style.height = star.style.width;
      starsContainer.appendChild(star);
    }

    // 인사말 목록
    const greetings = [
      { text: '안녕!',       emoji: '👋' },
      { text: '반가워!',     emoji: '😄' },
      { text: '하이~!',      emoji: '🙌' },
      { text: '헬로!',       emoji: '🌟' },
      { text: '좋은 하루!',  emoji: '☀️' },
      { text: '화이팅!',     emoji: '💪' },
    ];

    let currentIndex = 0;

    function changeGreeting() {
      currentIndex = (currentIndex + 1) % greetings.length;
      const { text, emoji } = greetings[currentIndex];

      const helloEl = document.getElementById('helloText');
      const emojiEl = document.getElementById('emoji');

      // 간단한 튕기는 효과
      helloEl.style.transition = 'transform 0.15s ease';
      helloEl.style.transform  = 'scale(1.3)';
      emojiEl.textContent = emoji;
      helloEl.textContent = text;

      setTimeout(() => {
        helloEl.style.transform = 'scale(1)';
      }, 150);
    }
  </script>

</body>
</html>
