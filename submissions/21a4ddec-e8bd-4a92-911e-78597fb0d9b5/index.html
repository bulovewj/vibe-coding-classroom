<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장지우의 무한 계단 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh;
    overflow: hidden;
    color: white;
  }

  /* 화면 전환 */
  .screen { display: none; width: 100vw; height: 100vh; }
  .screen.active { display: flex; }

  /* ===== 메인 메뉴 ===== */
  #mainMenu {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0d0d2b 0%, #1a0533 50%, #0d0d2b 100%);
    position: relative;
    overflow: hidden;
  }
  .stars {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from{opacity:0.2} to{opacity:1} }

  .game-title {
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(90deg, #FFD700, #FF6B6B, #4ECDC4, #FFD700);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: titleShine 3s linear infinite;
    margin-bottom: 5px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
  }
  @keyframes titleShine { 0%{background-position:0%} 100%{background-position:200%} }

  .player-name {
    font-size: 18px;
    color: #aaa;
    margin-bottom: 30px;
    text-align: center;
  }

  .menu-btn {
    width: 280px;
    padding: 15px 20px;
    margin: 8px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .menu-btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.5s, height 0.5s;
  }
  .menu-btn:hover::after { width: 300px; height: 300px; }
  .menu-btn:hover { transform: scale(1.05); }

  .btn-play { background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; }
  .btn-shop { background: linear-gradient(135deg, #4ECDC4, #44A08D); color: white; }
  .btn-modes { background: linear-gradient(135deg, #A8EDEA, #FED6E3); color: #333; }
  .btn-hard { background: linear-gradient(135deg, #f12711, #f5af19); color: white; }

  .currency-display {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.1);
    padding: 10px 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
  }
  .currency-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: bold;
  }
  .coin-icon { color: #FFD700; font-size: 22px; }
  .diamond-icon { color: #00BFFF; font-size: 22px; }

  /* ===== 게임 화면 ===== */
  #gameScreen {
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .game-hud {
    position: absolute;
    top: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    z-index: 100;
    pointer-events: none;
  }
  .hud-left, .hud-right {
    background: rgba(0,0,0,0.6);
    padding: 8px 15px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    font-size: 14px;
    pointer-events: auto;
  }
  .hud-center {
    background: rgba(0,0,0,0.7);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: bold;
    color: #FFD700;
    pointer-events: none;
  }
  .life-icon { color: #FF6B6B; font-size: 16px; }

  /* 컨트롤 버튼 */
  .game-controls {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 100;
  }
  .ctrl-btn {
    width: 80px; height: 80px;
    border: none;
    border-radius: 50%;
    font-size: 30px;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .btn-left { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .btn-right { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
  .btn-up { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }

  .btn-pause-game {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: rgba(0,0,0,0.7);
    border: 2px solid #FFD700;
    color: #FFD700;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
  }

  /* ===== 상점 화면 ===== */
  #shopScreen {
    flex-direction: column;
    background: linear-gradient(180deg, #1a0533, #0d1b2a);
    overflow-y: auto;
  }
  .shop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
    background: rgba(0,0,0,0.5);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .shop-title {
    font-size: 24px;
    font-weight: bold;
    color: #FFD700;
  }
  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 15px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
  }
  .shop-tabs {
    display: flex;
    gap: 10px;
    padding: 15px 20px;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    white-space: nowrap;
    transition: all 0.3s;
    background: rgba(255,255,255,0.1);
    color: white;
  }
  .tab-btn.active { background: #FFD700; color: #333; }
  .shop-content {
    padding: 15px 20px;
  }
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
  }
  .shop-item {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }
  .shop-item:hover { border-color: #FFD700; transform: translateY(-3px); }
  .shop-item.owned { border-color: #4ECDC4; }
  .shop-item.equipped { border-color: #FF6B6B; background: rgba(255,107,107,0.2); }
  .item-emoji { font-size: 48px; margin-bottom: 8px; display: block; }
  .item-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
  .item-price {
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .buy-btn {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .buy-btn:active { transform: scale(0.95); }
  .buy-btn.can-buy { background: linear-gradient(135deg, #FFD700, #FF8C00); color: #333; }
  .buy-btn.no-money { background: rgba(100,100,100,0.5); color: #888; cursor: not-allowed; }
  .buy-btn.owned-btn { background: linear-gradient(135deg, #4ECDC4, #44A08D); color: white; }
  .buy-btn.equipped-btn { background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; }

  /* ===== 모드 선택 ===== */
  #modeScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0d0d2b, #1a0533);
  }
  .mode-title {
    font-size: 28px;
    font-weight: bold;
    color: #FFD700;
    margin-bottom: 30px;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 0 20px;
    max-width: 500px;
    width: 100%;
  }
  .mode-card {
    padding: 20px 15px;
    border-radius: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid transparent;
  }
  .mode-card:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.5); }
  .mode-icon { font-size: 40px; margin-bottom: 10px; display: block; }
  .mode-name { font-size: 15px; font-weight: bold; }
  .mode-desc { font-size: 11px; margin-top: 5px; opacity: 0.8; }
  .mode-glass { background: linear-gradient(135deg, rgba(135,206,250,0.3), rgba(173,216,230,0.3)); }
  .mode-lava { background: linear-gradient(135deg, rgba(255,69,0,0.3), rgba(255,140,0,0.3)); }
  .mode-thief { background: linear-gradient(135deg, rgba(128,0,128,0.3), rgba(75,0,130,0.3)); }
  .mode-police { background: linear-gradient(135deg, rgba(0,100,200,0.3), rgba(0,50,150,0.3)); }

  /* ===== 팝업 / 오버레이 ===== */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    flex-direction: column;
  }
  .overlay.active { display: flex; }
  .popup {
    background: linear-gradient(135deg, #1a1a2e, #2a1a4e);
    border: 2px solid #FFD700;
    border-radius: 25px;
    padding: 30px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .popup h2 { font-size: 24px; color: #FFD700; margin-bottom: 15px; }
  .popup p { margin-bottom: 15px; font-size: 15px; color: #ccc; }
  .popup-btn {
    padding: 12px 30px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin: 5px;
    transition: all 0.2s;
  }
  .popup-btn:hover { transform: scale(1.05); }
  .popup-btn-primary { background: linear-gradient(135deg, #FFD700, #FF8C00); color: #333; }
  .popup-btn-secondary { background: rgba(255,255,255,0.2); color: white; }

  /* ===== 알림 ===== */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 12px 25px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: bold;
    z-index: 2000;
    transition: transform 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== 수집 팝업 ===== */
  .collect-popup {
    position: fixed;
    pointer-events: none;
    z-index: 900;
    font-size: 20px;
    font-weight: bold;
    animation: floatUp 1.5s forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-80px); }
  }

  /* 엘리베이터 게이지 */
  .elevator-gauge {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 200px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.3);
    overflow: hidden;
    z-index: 100;
  }
  .elevator-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: linear-gradient(0deg, #FFD700, #FF8C00);
    transition: height 0.3s;
    border-radius: 8px;
  }
  .elevator-label {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: #FFD700;
    white-space: nowrap;
    text-shadow: 1px 1px 3px black;
    z-index: 100;
  }

  /* 애니메이션 오버레이 */
  .mode-overlay-effect {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .mode-overlay-effect.lava {
    background: linear-gradient(0deg, rgba(255,69,0,0.15), transparent 50%);
    opacity: 1;
    animation: lavaFlicker 2s infinite alternate;
  }
  @keyframes lavaFlicker { from{opacity:0.3} to{opacity:0.15} }
  .mode-overlay-effect.glass {
    background: linear-gradient(180deg, rgba(135,206,250,0.1), rgba(255,255,255,0.05));
    opacity: 1;
  }

  .score-big {
    font-size: 48px;
    font-weight: 900;
    color: #FFD700;
    margin: 10px 0;
    text-shadow: 0 0 20px rgba(255,215,0,0.8);
  }
  .mode-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 15px;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 15px;
  }

  #hardModeLabel {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #f12711, #f5af19);
    padding: 5px 15px;
    border-radius: 15px;
    font-size: 13px;
    font-weight: bold;
    z-index: 100;
    display: none;
  }

  .pet-display {
    position: absolute;
    left: 15px;
    bottom: 140px;
    font-size: 30px;
    z-index: 100;
    animation: petBounce 1s infinite alternate;
  }
  @keyframes petBounce { from{transform:translateY(0)} to{transform:translateY(-5px)} }

  .elevator-active {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    z-index: 200;
    animation: elevatorAnim 2s forwards;
    pointer-events: none;
    display: none;
  }
  @keyframes elevatorAnim {
    0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:1;transform:translate(-50%,-150%) scale(1.3)}
    100%{opacity:0;transform:translate(-50%,-250%) scale(1)}
  }

  @media (max-width: 400px) {
    .game-title { font-size: 30px; }
    .ctrl-btn { width: 65px; height: 65px; font-size: 25px; }
    .menu-btn { width: 240px; font-size: 15px; }
  }
</style>
</head>
<body>

<!-- 토스트 알림 -->
<div class="toast" id="toast"></div>

<!-- ===== 메인 메뉴 ===== -->
<div id="mainMenu" class="screen active">
  <div class="stars" id="starsContainer"></div>
  <div class="game-title">🏃 무한의 계단</div>
  <div class="player-name">장지우의 게임</div>
  <div class="currency-display">
    <div class="currency-item">
      <span class="coin-icon">🪙</span>
      <span id="menuCoins">0</span>
    </div>
    <div class="currency-item">
      <span class="diamond-icon">💎</span>
      <span id="menuDiamonds">0</span>
    </div>
  </div>
  <button class="menu-btn btn-play" onclick="startGame('normal')">▶ 게임 시작</button>
  <button class="menu-btn btn-modes" onclick="showModeSelect()">🎮 모드 선택</button>
  <button class="menu-btn btn-shop" onclick="showShop()">🛍️ 상점</button>
  <button class="menu-btn btn-hard" onclick="startGame('hard')">💀 하드 모드 (거꾸로)</button>
</div>

<!-- ===== 모드 선택 ===== -->
<div id="modeScreen" class="screen">
  <div class="mode-title">🎮 모드 선택</div>
  <div class="mode-grid">
    <div class="mode-card mode-glass" onclick="startGame('glass')">
      <span class="mode-icon">🪟</span>
      <div class="mode-name">유리 계단</div>
      <div class="mode-desc">계단이 깨질 수 있어요!</div>
    </div>
    <div class="mode-card mode-lava" onclick="startGame('lava')">
      <span class="mode-icon">🌋</span>
      <div class="mode-name">용암 모드</div>
      <div class="mode-desc">용암이 올라와요!</div>
    </div>
    <div class="mode-card mode-thief" onclick="startGame('thief')">
      <span class="mode-icon">🦹</span>
      <div class="mode-name">도둑 잡기</div>
      <div class="mode-desc">도둑을 잡아라!</div>
    </div>
    <div class="mode-card mode-police" onclick="startGame('police')">
      <span class="mode-icon">👮</span>
      <div class="mode-name">경찰 피하기</div>
      <div class="mode-desc">경찰을 피해라!</div>
    </div>
  </div>
  <button class="menu-btn" style="margin-top:20px;background:rgba(255,255,255,0.2);color:white;border:none;border-radius:20px;padding:12px 30px;cursor:pointer;font-size:16px;" onclick="showScreen('mainMenu')">← 뒤로</button>
</div>

<!-- ===== 상점 ===== -->
<div id="shopScreen" class="screen">
  <div class="shop-header">
    <button class="back-btn" onclick="showScreen('mainMenu')">← 뒤로</button>
    <div class="shop-title">🛍️ 상점</div>
    <div style="display:flex;gap:10px;font-size:13px;">
      <span>🪙 <span id="shopCoins">0</span></span>
      <span>💎 <span id="shopDiamonds">0</span></span>
    </div>
  </div>
  <div class="shop-tabs">
    <button class="tab-btn active" onclick="switchTab('characters',this)">👾 캐릭터</button>
    <button class="tab-btn" onclick="switchTab('pets',this)">🐾 펫</button>
  </div>
  <div class="shop-content" id="shopContent"></div>
</div>

<!-- ===== 게임 화면 ===== -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  
  <div class="mode-overlay-effect" id="modeOverlay"></div>
  
  <div class="game-hud">
    <div class="hud-left">
      <span class="life-icon">❤️</span> <span id="hudLives">1</span>
      &nbsp; 🪙<span id="hudCoins">0</span>
      &nbsp; 💎<span id="hudDiamonds">0</span>
    </div>
    <div class="hud-center">🏃 <span id="hudSteps">0</span>계단</div>
    <div class="hud-right">
      <span id="hudMode">일반</span>
    </div>
  </div>

  <div id="hardModeLabel">💀 하드 모드 - 거꾸로 내려가기!</div>

  <div class="elevator-gauge">
    <div class="elevator-fill" id="elevatorFill" style="height:0%"></div>
  </div>
  <div class="elevator-label" id="elevatorLabel">🛗 200계단</div>

  <div class="pet-display" id="petDisplay"></div>
  <div class="elevator-active" id="elevatorAnim">🛗</div>

  <div class="game-controls">
    <button class="ctrl-btn btn-left" id="btnLeft" onmousedown="ctrlDown('left')" onmouseup="ctrlUp('left')" ontouchstart="ctrlDown('left')" ontouchend="ctrlUp('left')">↺</button>
    <button class="ctrl-btn btn-up" id="btnUp" onmousedown="ctrlDown('up')" onmouseup="ctrlUp('up')" ontouchstart="ctrlDown('up')" ontouchend="ctrlUp('up')">▲</button>
    <button class="ctrl-btn btn-right" id="btnRight" onmousedown="ctrlDown('right')" onmouseup="ctrlUp('right')" ontouchstart="ctrlDown('right')" ontouchend="ctrlUp('right')">↻</button>
  </div>

  <button class="btn-pause-game" onclick="pauseGame()">⏸</button>
</div>

<!-- ===== 게임 오버 팝업 ===== -->
<div class="overlay" id="gameOverOverlay">
  <div class="popup">
    <h2>💀 게임 오버!</h2>
    <div class="score-big" id="finalScore">0</div>
    <p>계단</p>
    <div id="modeResultBadge" class="mode-badge"></div>
    <p style="color:#FFD700;">🪙 획득 코인: <span id="earnedCoins">0</span></p>
    <p style="color:#00BFFF;">💎 획득 다이아: <span id="earnedDiamonds">0</span></p>
    <button class="popup-btn popup-btn-primary" onclick="restartGame()">🔄 다시 시작</button>
    <button class="popup-btn popup-btn-secondary" onclick="goHome()">🏠 메인 메뉴</button>
  </div>
</div>

<!-- ===== 일시정지 팝업 ===== -->
<div class="overlay" id="pauseOverlay">
  <div class="popup">
